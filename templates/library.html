<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BankDoc — Bibliothèque</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F6F8;--surface:#FFFFFF;--surface2:#F0F2F7;--surface3:#E8EBF2;
  --brand:#1A2E6B;--brand2:#253D8A;--brand-light:rgba(26,46,107,0.08);--brand-border:rgba(26,46,107,0.2);
  --success:#0C6B4E;--success-bg:rgba(12,107,78,0.07);--success-border:rgba(12,107,78,0.18);
  --warning:#7A4500;--warning-bg:rgba(122,69,0,0.07);--warning-border:rgba(122,69,0,0.18);
  --danger:#8B1A1A;--danger-bg:rgba(139,26,26,0.07);--danger-border:rgba(139,26,26,0.18);
  --purple:#3D1F7A;--purple-bg:rgba(61,31,122,0.07);--purple-border:rgba(61,31,122,0.18);
  --text:#0D1117;--text2:#3D4A5C;--text3:#6B7A8D;--text4:#9AAAB8;
  --border:#D8DDE8;--border-subtle:#EDF0F7;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'IBM Plex Serif',serif;
}
[data-theme="dark"]{
  --bg:#0A0D14;--surface:#111520;--surface2:#171C2B;--surface3:#1D2336;
  --brand:#4A6ED4;--brand2:#5A80E0;--brand-light:rgba(74,110,212,0.12);--brand-border:rgba(74,110,212,0.25);
  --success:#1DB87A;--success-bg:rgba(29,184,122,0.08);--success-border:rgba(29,184,122,0.2);
  --warning:#D4870A;--warning-bg:rgba(212,135,10,0.08);--warning-border:rgba(212,135,10,0.2);
  --danger:#E05050;--danger-bg:rgba(224,80,80,0.08);--danger-border:rgba(224,80,80,0.2);
  --purple:#8B6BD4;--purple-bg:rgba(139,107,212,0.08);--purple-border:rgba(139,107,212,0.2);
  --text:#E4EAF4;--text2:#8A9BB8;--text3:#5A6B84;--text4:#384456;
  --border:#1E2840;--border-subtle:#141A28;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── NAV ── */
.nav{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;flex-shrink:0;gap:0}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:28px}
.nav-logo{width:26px;height:26px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:14px;height:14px;fill:#fff}
.nav-title{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--text)}
.nav-sep{width:1px;height:14px;background:var(--border);margin:0 18px}
.nav-links{display:flex;gap:2px}
.nav-link{padding:5px 10px;font-size:12px;color:var(--text3);text-decoration:none;border-bottom:2px solid transparent;transition:color .15s}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:500}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-chip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--text3);padding:3px 9px;border:1px solid var(--border);background:var(--surface2)}
.dot{width:5px;height:5px;border-radius:50%}
.dot.ok{background:var(--success)}.dot.err{background:var(--danger)}.dot.pulse{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.theme-toggle{width:26px;height:26px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px}

/* ── LAYOUT ── */
.workspace{flex:1;display:grid;grid-template-columns:240px 1fr;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-inner{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:14px}
.sb-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);margin-bottom:6px;display:block}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:8px 28px 8px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border-color .15s;border-radius:4px}
.search-wrap input:focus{border-color:var(--brand)}
.search-wrap input::placeholder{color:var(--text4)}
.s-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text4);cursor:pointer;font-size:13px;display:none;line-height:1}
.cat-list{display:flex;flex-direction:column;gap:1px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;cursor:pointer;border-left:2px solid transparent;border-radius:0 4px 4px 0;transition:all .12s}
.cat-item:hover{background:var(--surface2)}
.cat-item.active{background:var(--brand-light);border-left-color:var(--brand)}
.cat-name{font-size:12px;color:var(--text2);font-weight:500}
.cat-item.active .cat-name{color:var(--brand)}
.cat-cnt{font-family:var(--mono);font-size:10px;color:var(--text4);background:var(--surface3);padding:1px 5px;border-radius:8px}
.cat-item.active .cat-cnt{background:var(--brand-light);color:var(--brand)}
.sort-select{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;cursor:pointer}
.range-label{display:flex;justify-content:space-between;margin-bottom:5px}
.range-label span{font-family:var(--mono);font-size:11px;color:var(--brand);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--surface3);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--brand);border-radius:50%;cursor:pointer}
.stats-list{display:flex;flex-direction:column;gap:1px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;cursor:pointer;border-left:2px solid transparent;border-radius:0 4px 4px 0;transition:all .12s}
.stat-row:hover{background:var(--surface2);border-left-color:var(--brand)}
.stat-row-name{font-size:11px;color:var(--text2)}
.stat-row-conf{font-family:var(--mono);font-size:11px;font-weight:500}
.conf-hi{color:var(--success)}.conf-mid{color:var(--warning)}.conf-lo{color:var(--danger)}
.manual-badge{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--warning-bg);border:1px solid var(--warning-border);border-radius:4px;cursor:pointer;transition:opacity .15s}
.manual-badge:hover{opacity:.8}
.manual-badge-left{font-size:12px;font-weight:500;color:var(--warning)}
.manual-badge-cnt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--warning)}

/* ── CENTER ── */
.center{display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-shrink:0}
.view-btns{display:flex;gap:1px;background:var(--surface3);padding:2px;border-radius:4px}
.vb{padding:5px 10px;background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;border-radius:3px;transition:all .12s}
.vb.active{background:var(--surface);color:var(--brand)}
.toolbar-info{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}
.sel-btn{padding:5px 10px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-size:11px;cursor:pointer}
.sel-btn:hover{border-color:var(--brand);color:var(--brand)}
.batch-bar{display:none;align-items:center;gap:8px;padding:7px 14px;background:var(--brand-light);border-bottom:1px solid var(--brand-border)}
.batch-bar.show{display:flex}
.batch-cnt{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--brand)}
.batch-btn{padding:5px 12px;font-size:11px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text2);font-family:var(--mono)}
.batch-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.batch-btn.danger:hover{border-color:var(--danger-border);color:var(--danger);background:var(--danger-bg)}
.batch-dismiss{background:none;border:none;color:var(--text3);cursor:pointer;margin-left:auto;font-size:16px}

/* ── GRID ── */
.doc-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;align-content:start}
.doc-grid.list-view{grid-template-columns:1fr;gap:4px}
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.doc-card:hover{border-color:var(--brand-border);box-shadow:0 2px 12px rgba(26,46,107,.1)}
.doc-card.selected{border-color:var(--brand);background:var(--brand-light)}
.doc-thumb{height:90px;background:var(--surface3);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle);position:relative;overflow:hidden}
.doc-thumb img{width:100%;height:100%;object-fit:cover;opacity:.85}
.doc-thumb-icon{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center}
.doc-thumb-icon svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:1.5}
.doc-type-tag{position:absolute;bottom:5px;left:5px;font-family:var(--mono);font-size:9px;padding:2px 6px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:3px;color:var(--text2)}
[data-theme="dark"] .doc-type-tag{background:rgba(17,21,32,.92)}
.doc-sel{position:absolute;top:6px;right:6px;width:16px;height:16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.doc-sel.on{background:var(--brand);border-color:var(--brand)}
.doc-sel.on::after{content:"✓";color:#fff;font-size:9px;font-weight:700}
.doc-needs-manual{position:absolute;top:6px;left:6px;width:16px;height:16px;background:var(--warning);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.doc-info{padding:8px 10px}
.doc-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;color:var(--text)}
.doc-meta{display:flex;align-items:center;gap:5px}
.conf-tag{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;border:1px solid;border-radius:3px}
.conf-tag.hi{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.conf-tag.mid{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border)}
.conf-tag.lo{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.doc-date{font-family:var(--mono);font-size:9px;color:var(--text4)}
/* List view */
.doc-grid.list-view .doc-card{display:flex;align-items:center;border-radius:4px}
.doc-grid.list-view .doc-thumb{width:52px;height:44px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--border-subtle);border-radius:4px 0 0 4px}
.doc-grid.list-view .doc-info{display:flex;align-items:center;gap:12px;flex:1;padding:0 12px}
.doc-grid.list-view .doc-name{flex:1;margin:0;font-size:12px}
.doc-grid.list-view .doc-type-tag{display:none}
.doc-grid.list-view .doc-needs-manual{position:static;margin-right:2px}
/* Pager */
.pager{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:3px;justify-content:center;flex-shrink:0}
.pg{padding:5px 10px;font-family:var(--mono);font-size:11px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2)}
.pg:hover:not(:disabled){border-color:var(--brand-border);color:var(--brand)}
.pg:disabled{opacity:.35;cursor:not-allowed}
.pg.active{background:var(--brand-light);border-color:var(--brand-border);color:var(--brand);font-weight:500}
.pg-dots{font-family:var(--mono);font-size:11px;color:var(--text3);padding:0 3px}
.grid-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px;grid-column:1/-1;color:var(--text3)}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════════════════════════════
   MODAL DÉTAIL
════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(13,17,23,.55);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
  padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  width:100%;max-width:960px;
  max-height:calc(100vh - 40px);
  display:flex;flex-direction:column;
  transform:translateY(12px) scale(.98);
  transition:transform .2s;
  overflow:hidden;
}
.modal-overlay.open .modal{transform:none}
.modal-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--surface2);
}
.modal-title{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px 6px;border-radius:4px;line-height:1;transition:color .15s}
.modal-close:hover{color:var(--text);background:var(--surface3)}
.modal-body{
  flex:1;overflow-y:auto;
  display:grid;grid-template-columns:300px 1fr;
  min-height:0;
}
.modal-left{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.modal-right{overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
/* Preview image */
.preview-box{padding:14px;border-bottom:1px solid var(--border-subtle);background:var(--surface3)}
.preview-img{background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:180px;max-height:240px;overflow:hidden}
.preview-img img{max-width:100%;max-height:220px;object-fit:contain;border-radius:6px}
.preview-meta{display:flex;gap:10px;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--text3)}
/* Sections modales */
.ms{border-bottom:1px solid var(--border-subtle);padding:14px 16px}
.ms:last-child{border-bottom:none}
.ms-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ms-label::before{content:"";width:2px;height:9px;background:var(--brand);flex-shrink:0}
/* Classification result */
.class-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.class-name{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text)}
.path-badge{font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;color:var(--text3);white-space:nowrap}
.conf-bar-wrap{display:flex;flex-direction:column;gap:4px}
.conf-bar-labels{display:flex;justify-content:space-between;font-size:11px}
.conf-bar-bg{height:4px;background:var(--surface3);border-radius:2px}
.conf-bar-fill{height:4px;border-radius:2px;transition:width .6s}
.conf-bar-fill.hi{background:var(--success)}.conf-bar-fill.mid{background:var(--warning)}.conf-bar-fill.lo{background:var(--danger)}
.verdict-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:4px 8px;border:1px solid;border-radius:3px;margin-top:8px}
.verdict-tag.ok{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.verdict-tag.warn{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border)}
/* LLM verdicts */
.llm-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);margin-bottom:5px;font-size:11px}
.llm-name{font-weight:500;display:flex;align-items:center;gap:5px}
.llm-pred{font-family:var(--mono);font-size:10px;color:var(--text3)}
.llm-badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border:1px solid;border-radius:3px}
.llm-badge.agree{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.llm-badge.disagree{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.llm-badge.unavail{background:var(--surface3);color:var(--text3);border-color:var(--border)}
/* Lexical scores */
.lex-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border-subtle)}
.lex-row:last-child{border-bottom:none}
.lex-name{color:var(--text2)}
.lex-score{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--brand)}
/* Meta grid */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-cell{background:var(--surface2);border:1px solid var(--border-subtle);border-radius:5px;padding:9px 11px}
.meta-cell.full{grid-column:span 2}
.meta-key{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:3px}
.meta-val{font-family:var(--mono);font-size:11px;color:var(--text);word-break:break-all;line-height:1.4}
/* Correction form */
.corr-tabs{display:flex;gap:2px;background:var(--surface3);padding:2px;border-radius:5px;margin-bottom:10px}
.ct{flex:1;padding:7px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);border-radius:4px;font-family:var(--font)}
.ct.active{background:var(--surface);color:var(--brand)}
.corr-select{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;margin-bottom:8px}
.corr-select:focus{border-color:var(--brand)}
.nt-input{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;margin-bottom:6px}
.nt-input:focus{border-color:var(--brand)}
.hint{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px}
.info-box{background:var(--brand-light);border:1px solid var(--brand-border);border-radius:5px;padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.corr-btn{width:100%;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:background .15s}
.corr-btn:hover{background:var(--brand2)}
.corr-btn:disabled{opacity:.4;cursor:not-allowed}
/* Extract */
.extract-btn{width:100%;padding:9px;background:var(--brand-light);border:1px solid var(--brand-border);border-radius:5px;color:var(--brand);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.extract-btn:hover{background:var(--brand);color:#fff}
.fields-table{width:100%;border-collapse:collapse}
.fields-table tr{border-bottom:1px solid var(--border-subtle)}
.fields-table tr:last-child{border-bottom:none}
.fields-table td{padding:7px 9px;font-size:11px}
.ft-key{color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono)}
.ft-val{font-family:var(--mono);color:var(--brand);text-align:right}
.ft-val.empty{color:var(--text4);font-style:italic}
.src-badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 7px;border:1px solid;border-radius:3px;margin-top:6px;display:inline-flex;align-items:center;gap:3px}
.src-badge.llama{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.src-badge.qwen{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.src-badge.cache{background:var(--surface2);color:var(--text3);border-color:var(--border)}
/* Scores mini */
.sc-row{display:grid;grid-template-columns:120px 1fr 38px;gap:6px;align-items:center;margin-bottom:4px}
.sc-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-bg{height:3px;background:var(--surface3);border-radius:2px}.sc-fill{height:3px;border-radius:2px;background:var(--border)}.sc-fill.top{background:var(--brand)}
.sc-pct{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right}
/* OCR */
.ocr-box{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;max-height:150px;overflow-y:auto;white-space:pre-wrap}
/* Modal footer */
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);background:var(--surface2);display:flex;gap:8px;flex-shrink:0}
.mf-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.mf-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.mf-btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.mf-btn.primary:hover{background:var(--brand2)}
.mf-btn.danger:hover{color:var(--danger);border-color:var(--danger-border);background:var(--danger-bg)}

/* Toasts */
.toasts{position:fixed;bottom:16px;right:16px;z-index:9000;display:flex;flex-direction:column;gap:5px}
.toast{padding:8px 14px;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:5px;animation:fadeup .2s ease;max-width:260px}
.toast.ok{border-left:2px solid var(--success);color:var(--success)}
.toast.err{border-left:2px solid var(--danger);color:var(--danger)}
@keyframes fadeup{from{transform:translateY(4px);opacity:0}to{transform:none;opacity:1}}

@media(max-width:900px){
  .workspace{grid-template-columns:1fr}
  .sidebar{display:none}
  .modal-body{grid-template-columns:1fr}
  .modal-left{border-right:none;border-bottom:1px solid var(--border)}
}
@media(max-width:600px){.modal{max-height:95vh;border-radius:8px}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="dashboard.html">
    <div class="nav-logo"><svg viewBox="0 0 16 16"><path d="M1 3h14v2H1zM1 7h14v6H1z"/></svg></div>
    <span class="nav-title">BankDoc</span>
  </a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">Tableau de bord</a>
    <a class="nav-link" href="queue.html">Traitement par lot</a>
    <a class="nav-link active" href="library.html">Bibliothèque</a>
    <a class="nav-link" href="manual_review.html" id="nav-manual" style="color:var(--warning)">À réviser</a>
  </div>
  <div class="nav-right">
    <div class="status-chip" id="total-chip">— docs</div>
    <div class="status-chip"><span class="dot pulse" id="dot-mongo"></span><span id="txt-mongo">MongoDB…</span></div>
    <button class="theme-toggle" onclick="toggleTheme()">◐</button>
  </div>
</nav>

<div class="workspace">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-inner">
      <div>
        <span class="sb-label">Rechercher</span>
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Nom, OCR, catégorie…" oninput="onSearch(this.value)"/>
          <button class="s-clear" id="s-clear" onclick="clearSearch()">×</button>
        </div>
      </div>
      <div>
        <span class="sb-label">Catégorie</span>
        <div class="cat-list" id="cat-list">
          <div class="cat-item active" onclick="setCat('')" data-cat=""><span class="cat-name">Tous les documents</span><span class="cat-cnt" id="cnt-all">—</span></div>
        </div>
      </div>
      <div>
        <span class="sb-label">Trier par</span>
        <select class="sort-select" id="sort" onchange="setSort(this.value)">
          <option value="date_desc">Date — récents en premier</option>
          <option value="date_asc">Date — anciens en premier</option>
          <option value="conf_desc">Confiance décroissante</option>
          <option value="conf_asc">Confiance croissante</option>
          <option value="name_asc">Nom A → Z</option>
        </select>
      </div>
      <div>
        <div class="range-label"><span class="sb-label" style="margin:0">Confiance min.</span><span id="conf-val">0%</span></div>
        <input type="range" min="0" max="100" value="0" id="conf-range" oninput="setConf(this.value)"/>
      </div>
      <div>
        <span class="sb-label">Confiance par catégorie</span>
        <div class="stats-list" id="stats-list"></div>
      </div>
      <div id="manual-sidebar" style="display:none">
        <a href="manual_review.html" class="manual-badge" style="text-decoration:none">
          <span class="manual-badge-left">⚠ À réviser manuellement</span>
          <span class="manual-badge-cnt" id="manual-cnt">—</span>
        </a>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="batch-bar" id="batch-bar">
      <span class="batch-cnt" id="batch-cnt">0 sélectionné(s)</span>
      <button class="batch-btn" onclick="batchDL()">⬇ Télécharger</button>
      <button class="batch-btn danger" onclick="batchDel()">🗑 Supprimer</button>
      <button class="batch-dismiss" onclick="clearSel()">×</button>
    </div>
    <div class="toolbar">
      <div class="view-btns">
        <button class="vb active" id="vg" onclick="setView('grid')">⊞</button>
        <button class="vb" id="vl" onclick="setView('list')">☰</button>
      </div>
      <span class="toolbar-info" id="toolbar-info">—</span>
      <button class="sel-btn" onclick="toggleSelAll()">Tout sélectionner</button>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="grid-empty"><div class="spin"></div></div>
    </div>
    <div class="pager" id="pager"></div>
  </div>
</div>

<!-- ════════════════ MODAL DÉTAIL ════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-left" id="modal-left"></div>
      <div class="modal-right" id="modal-right"></div>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API='http://localhost:5000';
const TYPE_LABELS={rib:"RIB",cheque:"Chèque",tableau_amortissement:"Tableau d'amortissement",acte_naissance:"Acte de naissance",acte_heredite:"Acte d'hérédité",assurance:"Assurance",attestation_solde:"Attestation de solde",carte_identite:"Carte d'Identité"};
const FIELD_LABELS={
  rib:{titulaire:"Titulaire",iban:"IBAN",bic:"BIC",code_banque:"Code banque",code_guichet:"Code guichet",num_compte:"N° compte",cle_rib:"Clé RIB",domiciliation:"Domiciliation",banque:"Banque"},
  cheque:{beneficiaire:"Bénéficiaire",montant_chiffres:"Montant",montant_lettres:"En lettres",date_emission:"Date",num_cheque:"N° chèque",tire_sur:"Tiré sur",emetteur:"Émetteur",endossable:"Endossable"},
  tableau_amortissement:{montant_pret:"Montant prêt",taux_interet:"Taux",duree:"Durée",mensualite:"Mensualité",capital_initial:"Capital",date_debut:"Début",nombre_echeances:"Échéances",banque:"Banque"},
  acte_naissance:{nom:"Nom",prenom:"Prénom",date_naissance:"Naissance",heure_naissance:"Heure",lieu_naissance:"Lieu",sexe:"Sexe",pere:"Père",mere:"Mère",num_acte:"N° acte",date_acte:"Date acte"},
  acte_heredite:{defunt:"Défunt(e)",date_deces:"Décès",lieu_deces:"Lieu décès",heritiers:"Héritiers",notaire:"Notaire",date_acte:"Date acte",lieu_acte:"Lieu acte"},
  assurance:{assure:"Assuré(e)",num_contrat:"N° contrat",type_garantie:"Garantie",date_effet:"Effet",date_echeance:"Échéance",prime:"Prime",assureur:"Assureur",agence:"Agence"},
  attestation_solde:{titulaire:"Titulaire",num_compte:"N° compte",solde:"Solde",arrete_au:"Arrêté au",banque:"Banque",agence:"Agence",type_compte:"Type compte"},
};

let S={docs:[],total:0,page:1,pages:1,cat:'',q:'',sort:'date_desc',confMin:0,sel:new Set(),view:'grid',allTypes:[]};
let searchT=null,currentDoc=null;

function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('theme',d?'light':'dark');}
(()=>{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');})();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function confCls(c){return c>=80?'hi':c>=60?'mid':'lo';}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}
function fmtFull(iso){if(!iso)return'—';return new Date(iso).toLocaleString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtSz(b){if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

(async()=>{checkMongo();await loadAllTypes();await loadStats();await loadDocs();})();

async function checkMongo(){
  try{const r=await fetch(`${API}/status`,{signal:AbortSignal.timeout(4000)});const d=await r.json();
  document.getElementById('dot-mongo').className=`dot ${d.mongodb?'ok':'err'}`;
  const t=document.getElementById('txt-mongo');t.textContent=d.mongodb?'MongoDB':'Hors ligne';t.style.color=d.mongodb?'var(--success)':'var(--danger)';}
  catch{document.getElementById('dot-mongo').className='dot err';}
}
async function loadAllTypes(){try{const r=await fetch(`${API}/types`);const d=await r.json();S.allTypes=d.types||[];}catch{}}
async function loadStats(){
  try{
    const r=await fetch(`${API}/documents/stats`);const d=await r.json();
    const stats=d.stats||[];const total=d.total||0;
    document.getElementById('total-chip').textContent=`${total} doc${total!==1?'s':''}`;
    document.getElementById('cnt-all').textContent=total;
    // Cat list
    document.getElementById('cat-list').innerHTML=
      `<div class="cat-item ${S.cat===''?'active':''}" onclick="setCat('')" data-cat=""><span class="cat-name">Tous les documents</span><span class="cat-cnt">${total}</span></div>`
      +stats.map(s=>`<div class="cat-item ${S.cat===s.category?'active':''}" onclick="setCat('${esc(s.category)}')" data-cat="${esc(s.category)}"><span class="cat-name">${esc(TYPE_LABELS[s.category]||s.category)}</span><span class="cat-cnt">${s.count}</span></div>`).join('');
    // Stats list
    document.getElementById('stats-list').innerHTML=stats.map(s=>`<div class="stat-row" onclick="setCat('${esc(s.category)}')"><span class="stat-row-name">${esc(TYPE_LABELS[s.category]||s.category)}</span><span class="stat-row-conf ${confCls(s.avg_confidence)}">${s.avg_confidence.toFixed(0)}%</span></div>`).join('');
    // Manual badge
    try{
      const mr=await fetch(`${API}/documents?page=1&per_page=1&needs_manual=true`);
      const md=await mr.json();
      const manualCount=md.total||0;
      if(manualCount>0){
        document.getElementById('manual-sidebar').style.display='block';
        document.getElementById('manual-cnt').textContent=manualCount;
        document.getElementById('nav-manual').textContent=`⚠ À réviser (${manualCount})`;
      }
    }catch{}
  }catch(e){console.error(e);}
}
async function loadDocs(page=1){
  S.page=page;
  document.getElementById('doc-grid').innerHTML=`<div class="grid-empty"><div class="spin"></div></div>`;
  try{
    const p=new URLSearchParams({category:S.cat,q:S.q,page,per_page:24,sort:S.sort,conf_min:S.confMin});
    const r=await fetch(`${API}/documents?${p}`);const d=await r.json();
    if(d.error){gridErr(d.error);return;}
    S.docs=d.documents||[];S.total=d.total;S.pages=d.pages;
    renderGrid();renderPager();
    const s=(page-1)*24+1,e=Math.min(page*24,S.total);
    document.getElementById('toolbar-info').textContent=S.total?`${s}–${e} / ${S.total}`:'Aucun résultat';
  }catch(e){gridErr(e.message);}
}
function renderGrid(){
  const g=document.getElementById('doc-grid');
  g.className=`doc-grid ${S.view==='list'?'list-view':''}`;
  if(!S.docs.length){g.innerHTML=`<div class="grid-empty"><div style="font-size:12px">${S.q?`Aucun résultat pour «${esc(S.q)}»`:'Aucun document'}</div></div>`;return;}
  g.innerHTML=S.docs.map(doc=>{
    const cc=confCls(doc.confidence);const sel=S.sel.has(doc._id);
    const needsM=doc.needs_manual&&!doc.corrected;
    return`<div class="doc-card ${sel?'selected':''}" id="c-${doc._id}" onclick="openDoc('${doc._id}')">
      <div class="doc-thumb">
        <img src="${API}/documents/${doc._id}/download" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="doc-thumb-icon" style="display:none"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="doc-type-tag">${esc(TYPE_LABELS[doc.prediction]||doc.prediction)}</div>
        ${needsM?`<div class="doc-needs-manual">!</div>`:''}
        <div class="doc-sel ${sel?'on':''}" onclick="event.stopPropagation();toggleSel('${doc._id}')"></div>
      </div>
      <div class="doc-info">
        <div class="doc-name" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div>
        <div class="doc-meta"><span class="conf-tag ${cc}">${(doc.confidence||0).toFixed(0)}%</span><span class="doc-date">${fmtDate(doc.uploaded_at)}</span></div>
      </div>
    </div>`;
  }).join('');
}
function renderPager(){
  const bar=document.getElementById('pager');if(S.pages<=1){bar.innerHTML='';return;}
  const p=S.page,t=S.pages,range=[];
  for(let i=1;i<=t;i++){if(i===1||i===t||Math.abs(i-p)<=1)range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  bar.innerHTML=`<button class="pg" onclick="loadDocs(${p-1})" ${p<=1?'disabled':''}>←</button>${range.map(r=>r==='…'?`<span class="pg-dots">…</span>`:`<button class="pg ${r===p?'active':''}" onclick="loadDocs(${r})">${r}</button>`).join('')}<button class="pg" onclick="loadDocs(${p+1})" ${p>=t?'disabled':''}>→</button>`;
}
function gridErr(msg){document.getElementById('doc-grid').innerHTML=`<div class="grid-empty"><div style="font-size:12px;color:var(--danger)">${esc(msg)}</div></div>`;}

/* ── MODAL ── */
async function openDoc(id){
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-left').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px"><div class="spin"></div></div>`;
  document.getElementById('modal-right').innerHTML='';
  document.getElementById('modal-footer').innerHTML='';
  document.getElementById('modal-title').textContent='Chargement…';
  try{
    const r=await fetch(`${API}/documents/${id}`);
    const doc=await r.json();
    currentDoc=doc;
    renderModal(doc);
  }catch(e){
    document.getElementById('modal-left').innerHTML=`<div style="padding:20px;font-size:12px;color:var(--danger)">Erreur : ${esc(e.message)}</div>`;
  }
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');currentDoc=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

function renderModal(doc){
  const cc=confCls(doc.confidence);
  document.getElementById('modal-title').textContent=doc.original_filename;

  // ── LEFT ──
  const qwen=doc.qwen||{};const votes=doc.votes||{};const llamaResult=doc.llama_result||{};
  const llamaPred=votes.llm||llamaResult.class||null;
  const qwenPred=votes.qwen||qwen.class||null;
  const mp=doc.prediction;
  const llamaAgrees=llamaPred&&llamaPred.toLowerCase()===mp.toLowerCase();
  const qwenAgrees=qwenPred&&qwenPred.toLowerCase()===mp.toLowerCase();
  const llamaAvail=!!(llamaPred);const qwenAvail=!!(qwenPred||qwen.available);

  const SUPPORTED=['rib','cheque','tableau_amortissement','acte_naissance','acte_heredite','assurance','attestation_solde'];
  const supE=SUPPORTED.includes(doc.prediction);
  const cached=doc.extracted_fields;
  const hasCache=cached&&Object.values(cached).some(v=>v);

  document.getElementById('modal-left').innerHTML=`
    <div class="preview-box">
      <div class="preview-img">
        <img src="${API}/documents/${doc._id}/download" alt="Aperçu" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div style="display:none;text-align:center;padding:20px;font-size:11px;color:var(--text4)">Aperçu non disponible</div>
      </div>
      <div class="preview-meta">
        <span>📁 ${esc(doc.original_filename)}</span>
        <span>📏 ${fmtSz(doc.file_size_bytes)}</span>
      </div>
    </div>
    <div class="ms">
      <div class="ms-label">Classification</div>
      <div class="class-row">
        <div class="class-name">${esc(TYPE_LABELS[mp]||mp)}</div>
        <div class="path-badge">${esc(doc.path||'—')}</div>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-labels"><span style="font-size:11px;color:var(--text3)">Confiance</span><span style="font-family:var(--mono);font-size:11px;font-weight:500" class="${cc}">${(doc.confidence||0).toFixed(1)}%</span></div>
        <div class="conf-bar-bg"><div class="conf-bar-fill ${cc}" style="width:${Math.min(doc.confidence||0,100)}%"></div></div>
      </div>
      <div class="verdict-tag ${doc.agreement?'ok':'warn'}">${doc.agreement?'✅ Validé auto':'⚠ Révision requise'}</div>
    </div>
    <div class="ms">
      <div class="ms-label">Vérification IA</div>
      <div class="llm-row"><div class="llm-name">llama3.2</div><div class="llm-pred">${llamaAvail?esc(TYPE_LABELS[llamaPred]||llamaPred):'—'}</div><div class="llm-badge ${!llamaAvail?'unavail':llamaAgrees?'agree':'disagree'}">${!llamaAvail?'Non dispo':llamaAgrees?'✓ OK':'✗ Diff.'}</div></div>
      <div class="llm-row"><div class="llm-name" style="color:var(--purple)">Qwen2.5-VL</div><div class="llm-pred">${qwenAvail?esc(TYPE_LABELS[qwenPred]||qwenPred||'—'):'—'}</div><div class="llm-badge ${!qwenAvail?'unavail':qwenAgrees?'agree':'disagree'}">${!qwenAvail?'Non dispo':qwenAgrees?'✓ OK':'✗ Diff.'}</div></div>
      ${qwen.reasoning?`<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border-subtle);border-radius:5px;line-height:1.5">${esc(qwen.reasoning.substring(0,200))}</div>`:''}
    </div>
    ${(doc.all_scores||[]).length?`<div class="ms">
      <div class="ms-label">Scores</div>
      ${doc.all_scores.map((s,i)=>`<div class="sc-row"><div class="sc-name">${esc(TYPE_LABELS[s.class]||s.class)}</div><div class="sc-bg"><div class="sc-fill ${i===0?'top':''}" style="width:${(s.score*100).toFixed(0)}%"></div></div><div class="sc-pct">${(s.score*100).toFixed(1)}%</div></div>`).join('')}
    </div>`:''}
    <div class="ms">
      <div class="ms-label">Informations</div>
      <div class="meta-grid">
        <div class="meta-cell"><div class="meta-key">Taille</div><div class="meta-val">${fmtSz(doc.file_size_bytes)}</div></div>
        <div class="meta-cell"><div class="meta-key">Date</div><div class="meta-val">${fmtDate(doc.uploaded_at)}</div></div>
        <div class="meta-cell full"><div class="meta-key">ID</div><div class="meta-val" style="font-size:9px;color:var(--text3)">${esc(doc._id)}</div></div>
      </div>
    </div>
  `;

  // ── RIGHT ──
  // Correction
  const corrHTML=`<div>
    <div class="ms-label">Corriger la classification</div>
    <div id="corr-tabs-${doc._id}" class="corr-tabs">
      <button class="ct active" id="ct-ex-${doc._id}" onclick="setCorrTab('${doc._id}','ex')">Type existant</button>
      <button class="ct" id="ct-nw-${doc._id}" onclick="setCorrTab('${doc._id}','nw')">Nouveau type</button>
    </div>
    <div id="ct-ex-p-${doc._id}">
      <select class="corr-select" id="cs-${doc._id}">${renderTypeOptions(doc.prediction)}</select>
    </div>
    <div id="ct-nw-p-${doc._id}" style="display:none">
      <input class="nt-input" type="text" id="nt-n-${doc._id}" placeholder="ex: certificat_vie" oninput="onNtName('${doc._id}',this.value)" maxlength="50"/>
      <div class="hint" id="nt-sl-${doc._id}"></div>
      <input class="nt-input" type="text" id="nt-l-${doc._id}" placeholder="Libellé (ex: Certificat de vie)"/>
      <div class="info-box">Disponible au ré-entraînement à partir de 50 documents.</div>
    </div>
    <button class="corr-btn" onclick="correctCat('${doc._id}')">Confirmer la correction</button>
  </div>`;

  // Extraction
  const extractHTML=supE?`<div>
    <div class="ms-label">Extraction de champs</div>
    <div id="ex-body-${doc._id}">
      ${hasCache?renderFields(cached,doc.extraction_source||'cache',doc.prediction,doc._id,false):renderEmptyFields(doc.prediction,doc._id)}
    </div>
  </div>`:'';

  // OCR
  const ocrHTML=doc.ocr_text?`<div>
    <div class="ms-label">Texte OCR</div>
    <div class="ocr-box">${esc(doc.ocr_text)}</div>
  </div>`:'';

  // Pipeline steps
  const stepsHTML=(doc.steps&&doc.steps.length)?`<div>
    <div class="ms-label">Journal pipeline</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      ${doc.steps.map((s,i)=>`<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-subtle)">
        <div style="width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:500;background:var(--surface3);border:1px solid var(--border);border-radius:3px">${i+1}</div>
        <div><div style="font-size:11px;font-weight:500;margin-bottom:1px">${esc(s.step)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3);line-height:1.4">${esc(s.detail||'')}</div></div>
      </div>`).join('')}
    </div>
  </div>`:'';

  document.getElementById('modal-right').innerHTML=corrHTML+extractHTML+ocrHTML+stepsHTML;

  // Footer
  document.getElementById('modal-footer').innerHTML=`
    <button class="mf-btn primary" onclick="dlDoc('${doc._id}','${esc(doc.original_filename)}')">⬇ Télécharger</button>
    <button class="mf-btn danger" onclick="delDoc('${doc._id}')">🗑 Supprimer</button>
    ${doc.needs_manual?`<a class="mf-btn" href="manual_classify.html?doc_id=${doc._id}&filename=${encodeURIComponent(doc.original_filename)}&confidence=${doc.confidence}&prediction=${encodeURIComponent(doc.prediction)}&ocr=${encodeURIComponent((doc.ocr_text||'').substring(0,500))}&scores=${encodeURIComponent(JSON.stringify(doc.all_scores||[]))}" style="text-decoration:none;background:var(--warning);border-color:var(--warning);color:#fff">⚠ Classifier</a>`:''}
  `;
}

function renderTypeOptions(current){
  const base=Object.keys(TYPE_LABELS);
  const custom=(S.allTypes||[]).filter(t=>t.is_custom);
  let opts=base.map(k=>`<option value="${k}" ${k===current?'selected':''}>${esc(TYPE_LABELS[k])}</option>`).join('');
  if(custom.length)opts+=custom.map(t=>`<option value="${t.name}" ${t.name===current?'selected':''}>${esc(t.label||t.name)} (custom)</option>`).join('');
  opts+=`<option value="inconnu" ${current==='inconnu'?'selected':''}>Inconnu</option>`;
  return opts;
}
function setCorrTab(id,mode){
  const ep=document.getElementById(`ct-ex-p-${id}`),np=document.getElementById(`ct-nw-p-${id}`);
  const eb=document.getElementById(`ct-ex-${id}`),nb=document.getElementById(`ct-nw-${id}`);
  if(mode==='ex'){ep.style.display='';np.style.display='none';eb.classList.add('active');nb.classList.remove('active');}
  else{ep.style.display='none';np.style.display='';nb.classList.add('active');eb.classList.remove('active');}
}
function onNtName(id,val){
  const slug=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  const sp=document.getElementById(`nt-sl-${id}`);
  sp.textContent=slug?`→ identifiant : "${slug}"`:'';
}
async function correctCat(id){
  const isNew=document.getElementById(`ct-nw-p-${id}`)?.style.display!=='none';
  try{
    let body={};
    if(!isNew){const sel=document.getElementById(`cs-${id}`);if(!sel)return;body={type_name:sel.value,create_new:false};}
    else{
      const raw=document.getElementById(`nt-n-${id}`)?.value.trim()||'';
      const slug=raw.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      const label=document.getElementById(`nt-l-${id}`)?.value.trim()||slug.replace(/_/g,' ');
      if(!slug||slug.length<2){toast('Identifiant invalide','err');return;}
      body={type_name:slug,label,create_new:true};
    }
    const r=await fetch(`${API}/documents/${id}/classify_manual`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.success){toast(`→ ${body.type_name}`,'ok');await loadAllTypes();await loadStats();await loadDocs(S.page);closeModalDirect();}
    else toast('Erreur : '+(d.error||'?'),'err');
  }catch{toast('Erreur réseau','err');}
}
function renderEmptyFields(docType,docId){
  const sf=FIELD_LABELS[docType]||{};const fk=Object.keys(sf);
  if(!fk.length)return`<div style="font-size:11px;color:var(--text3)">Aucun champ défini</div>`;
  return`<table class="fields-table">${fk.map(k=>`<tr><td class="ft-key">${esc(sf[k]||k)}</td><td class="ft-val empty">—</td></tr>`).join('')}</table>
  <div style="margin-top:10px"><button class="extract-btn" onclick="runExtract('${docId}','${docType}')">⚙ Extraire les informations</button></div>`;
}
function renderFields(fields,source,docType,docId,hasError=false,errorMsg=''){
  const sf=FIELD_LABELS[docType]||{};const fk=Object.keys(sf);
  if(!fk.length)return`<div style="font-size:11px;color:var(--text3)">Aucun champ défini</div>`;
  const filled=fk.filter(k=>fields[k]).length;
  const sCls={'llama3.2':'llama','qwen':'qwen','cache':'cache','none':'src-badge'}[source]||'cache';
  return`<table class="fields-table">${fk.map(k=>`<tr><td class="ft-key">${esc(sf[k]||k)}</td><td class="ft-val ${fields[k]?'':' empty'}">${fields[k]?esc(String(fields[k])):'—'}</td></tr>`).join('')}</table>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:5px">
    <span class="src-badge ${sCls}">${esc(source||'—')} · ${filled}/${fk.length}</span>
    <button class="extract-btn" style="width:auto;padding:4px 12px;font-size:10px" onclick="runExtract('${docId}','${docType}',true)">↻ Ré-extraire</button>
  </div>`;
}
async function runExtract(docId,docType,force=false){
  const body=document.getElementById(`ex-body-${docId}`);if(!body)return;
  body.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:10px;font-size:11px;color:var(--text3)"><div class="spin" style="width:12px;height:12px;border-width:2px"></div>Extraction…</div>`;
  try{
    const r=await fetch(`${API}/documents/${docId}/extract`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({force})});
    const d=await r.json();
    body.innerHTML=renderFields(d.fields||{},d.source||'none',docType,docId,d._error||!!d.error,d._error_msg||d.error||'');
    toast(d._error?`⚠ Extraction échouée`:`✅ ${Object.values(d.fields||{}).filter(v=>v).length} champs`,'ok');
  }catch(e){toast(`❌ ${e.message}`,'err');}
}

/* ── FILTERS ── */
function setCat(cat){S.cat=cat;S.page=1;document.querySelectorAll('.cat-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));loadDocs(1);}
function setSort(v){S.sort=v;loadDocs(1);}
function setConf(v){S.confMin=parseInt(v);document.getElementById('conf-val').textContent=v+'%';clearTimeout(searchT);searchT=setTimeout(()=>loadDocs(1),400);}
function onSearch(v){document.getElementById('s-clear').style.display=v?'block':'none';clearTimeout(searchT);searchT=setTimeout(()=>{S.q=v;loadDocs(1);},350);}
function clearSearch(){document.getElementById('search').value='';document.getElementById('s-clear').style.display='none';S.q='';loadDocs(1);}
function setView(v){S.view=v;document.getElementById('vg').classList.toggle('active',v==='grid');document.getElementById('vl').classList.toggle('active',v==='list');renderGrid();}

/* ── SELECTION ── */
function toggleSel(id){S.sel.has(id)?S.sel.delete(id):S.sel.add(id);const c=document.getElementById(`c-${id}`);c?.classList.toggle('selected',S.sel.has(id));c?.querySelector('.doc-sel')?.classList.toggle('on',S.sel.has(id));updateBatch();}
function toggleSelAll(){S.sel.size===S.docs.length?S.sel.clear():S.docs.forEach(d=>S.sel.add(d._id));renderGrid();updateBatch();}
function clearSel(){S.sel.clear();renderGrid();updateBatch();}
function updateBatch(){const n=S.sel.size;document.getElementById('batch-bar').classList.toggle('show',n>0);document.getElementById('batch-cnt').textContent=`${n} sélectionné${n>1?'s':''}`;}
async function batchDel(){if(!S.sel.size)return;if(!confirm(`Supprimer ${S.sel.size} document(s) ?`))return;let ok=0;for(const id of[...S.sel]){try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();if(d.success)ok++;}catch{}}S.sel.clear();updateBatch();toast(`${ok} supprimé(s)`,'ok');closeModalDirect();await loadStats();await loadDocs(1);}
async function batchDL(){for(const id of[...S.sel]){const doc=S.docs.find(d=>d._id===id);if(doc){const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=doc.original_filename;a.click();await new Promise(r=>setTimeout(r,200));}}toast('Téléchargements démarrés','ok');}
async function dlDoc(id,fn){const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=fn;a.click();toast('Téléchargement démarré','ok');}
async function delDoc(id){if(!confirm('Supprimer ce document ?'))return;try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();if(d.success){toast('Supprimé','ok');closeModalDirect();await loadStats();await loadDocs(S.page);}else toast('Erreur : '+(d.error||'?'),'err');}catch{toast('Erreur réseau','err');}}
function toast(msg,type='ok'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);}
</script>
</body>
