<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BankDoc — Bibliothèque</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-base:#F2F5FB;--bg-surface:#FFFFFF;--bg-raised:#F8FAFF;--bg-sunken:#EBF0FA;
  --brand:#2255CC;--brand-light:#4A7AEF;--brand-dark:#1A3E99;
  --brand-muted:rgba(34,85,204,0.09);--brand-border:rgba(34,85,204,0.20);
  --success:#0E7A5C;--success-bg:rgba(14,122,92,0.09);--success-border:rgba(14,122,92,0.22);
  --warning:#B45309;--warning-bg:rgba(180,83,9,0.09);--warning-border:rgba(180,83,9,0.22);
  --danger:#C0392B;--danger-bg:rgba(192,57,43,0.09);--danger-border:rgba(192,57,43,0.22);
  --purple:#6B2EB5;--purple-bg:rgba(107,46,181,0.09);--purple-border:rgba(107,46,181,0.22);
  --text:#0F1628;--text2:#4A5568;--text3:#8C97A8;--text4:#B8C2D0;
  --border:#D1D9E6;--border-subtle:#E8EDF5;
  --shadow-sm:0 1px 3px rgba(15,22,40,0.08);--shadow-md:0 4px 12px rgba(15,22,40,0.10);--shadow-lg:0 12px 32px rgba(15,22,40,0.13);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-full:9999px;
}
[data-theme="dark"]{
  --bg-base:#0C1220;--bg-surface:#141E30;--bg-raised:#1A2540;--bg-sunken:#0A0F1A;
  --brand:#4A7AEF;--brand-light:#6B97F5;--brand-muted:rgba(74,122,239,0.12);--brand-border:rgba(74,122,239,0.28);
  --success:#2DD4A0;--success-bg:rgba(45,212,160,0.10);--success-border:rgba(45,212,160,0.28);
  --warning:#F5A623;--warning-bg:rgba(245,166,35,0.10);--warning-border:rgba(245,166,35,0.28);
  --danger:#F05252;--danger-bg:rgba(240,82,82,0.10);--danger-border:rgba(240,82,82,0.28);
  --purple:#A78BFA;--purple-bg:rgba(167,139,250,0.10);--purple-border:rgba(167,139,250,0.28);
  --text:#E8EEF8;--text2:#8FA4C0;--text3:#4E6480;--text4:#2E3F55;
  --border:#1E2E45;--border-subtle:#162035;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.25);--shadow-md:0 4px 12px rgba(0,0,0,0.30);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-size:16px}
body{background:var(--bg-base);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;overflow:hidden}

/* SCROLLBARS */
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg-sunken);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;border:2px solid var(--bg-sunken)}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* TOPBAR */
.topbar{
  height:60px;flex-shrink:0;background:var(--bg-surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:14px;box-shadow:var(--shadow-sm);
}
.topbar-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--brand),var(--brand-light));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.topbar-count{font-family:var(--mono);font-size:11px;color:var(--text3);padding:3px 11px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-full)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.nav-btn{display:flex;align-items:center;gap:7px;color:var(--text2);font-size:12px;font-weight:500;text-decoration:none;padding:7px 13px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-raised);transition:all .15s}
.nav-btn:hover{color:var(--text);border-color:var(--brand-border);background:var(--brand-muted)}
.nav-btn.accent{color:var(--brand);border-color:var(--brand-border);background:var(--brand-muted)}
.mongo-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;padding:5px 13px;border-radius:var(--r-full);border:1px solid var(--border);background:var(--bg-raised)}
.mongo-status.ok .dot-{background:var(--success)}
.mongo-status.err .dot-{background:var(--danger)}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-dot.ok{background:var(--success);box-shadow:0 0 0 2px var(--success-bg)}
.stat-dot.err{background:var(--danger)}
.stat-dot.loading{background:var(--text4)}
.theme-btn{width:34px;height:34px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-raised);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr 420px;flex:1;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{
  background:var(--bg-surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-sec{padding:16px 18px;border-bottom:1px solid var(--border-subtle)}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:8px}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:9px 32px 9px 36px;background:var(--bg-raised);
  border:1.5px solid var(--border);border-radius:var(--r-md);
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:all .15s;
}
.search-wrap input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-muted)}
.search-wrap input::placeholder{color:var(--text4)}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.s-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px;display:none}

.filter-list{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto}
.fi{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:var(--r-md);cursor:pointer;transition:all .12s;border:1px solid transparent}
.fi:hover{background:var(--bg-raised)}
.fi.active{background:var(--brand-muted);border-color:var(--brand-border)}
.fi-left{display:flex;align-items:center;gap:9px}
.fi-em{font-size:16px;width:22px;text-align:center}
.fi-name{font-size:13px;font-weight:500;color:var(--text2)}
.fi.active .fi-name{color:var(--brand);font-weight:600}
.fi-badge{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg-sunken);padding:2px 8px;border-radius:var(--r-full)}
.fi.active .fi-badge{background:var(--brand-muted);color:var(--brand)}

.sort-sel{
  width:100%;padding:9px 11px;background:var(--bg-raised);border:1.5px solid var(--border);
  border-radius:var(--r-md);color:var(--text);font-family:var(--font);font-size:13px;outline:none;cursor:pointer;
}
.sort-sel:focus{border-color:var(--brand)}

.range-wrap{display:flex;flex-direction:column;gap:6px}
.range-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bg-sunken);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--brand);border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(34,85,204,.35);border:2px solid #fff}

.sb-scroll{flex:1;overflow-y:auto;padding:12px 18px}
.stats-rows{display:flex;flex-direction:column;gap:5px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:var(--r-md);cursor:pointer;transition:all .12s}
.stat-row:hover{border-color:var(--brand-border);background:var(--brand-muted)}
.stat-cat{font-size:12px;color:var(--text2);font-weight:500}
.stat-avg{font-family:var(--mono);font-size:13px;font-weight:600}

/* CENTER */
.grid-area{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base)}
.batch-bar{
  display:none;align-items:center;gap:10px;padding:10px 20px;
  background:var(--brand-muted);border-bottom:1px solid var(--brand-border);font-size:13px;
}
.batch-bar.show{display:flex}
.batch-count{color:var(--brand);font-weight:600}
.batch-btn{padding:6px 13px;border-radius:var(--r-md);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-surface);color:var(--text2);transition:all .12s}
.batch-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.batch-btn.danger:hover{border-color:var(--danger-border);color:var(--danger);background:var(--danger-bg)}
.batch-desel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;margin-left:auto;padding:2px}

.grid-toolbar{
  padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;background:var(--bg-surface);
}
.view-btns{display:flex;gap:3px}
.view-btn{padding:6px 11px;border-radius:var(--r-md);cursor:pointer;background:none;border:1px solid var(--border);color:var(--text3);font-size:14px;transition:all .12s}
.view-btn.active{background:var(--bg-raised);border-color:var(--brand-border);color:var(--brand)}
.grid-info{font-family:var(--mono);font-size:12px;color:var(--text3);margin-left:auto}
.sel-all-btn{padding:6px 13px;border-radius:var(--r-md);cursor:pointer;background:var(--bg-raised);border:1px solid var(--border);color:var(--text3);font-size:12px;font-weight:500;transition:all .12s}
.sel-all-btn:hover{border-color:var(--brand-border);color:var(--brand)}

.doc-grid{
  flex:1;overflow-y:auto;padding:16px 20px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;align-content:start;
}
.doc-grid.list{grid-template-columns:1fr;gap:6px}

.doc-card{
  background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:all .15s;position:relative;
  box-shadow:var(--shadow-sm);
}
.doc-card:hover{border-color:var(--brand-border);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.doc-card.selected{border-color:var(--brand);background:var(--brand-muted)}
.doc-card.active{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-muted)}

.doc-thumb{
  height:100px;background:var(--bg-sunken);display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;border-bottom:1px solid var(--border-subtle);
}
.cat-tag{position:absolute;bottom:6px;left:7px;font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:var(--r-full);background:rgba(255,255,255,.85);border:1px solid var(--border);color:var(--text2);backdrop-filter:blur(4px)}
[data-theme="dark"] .cat-tag{background:rgba(20,30,48,.85)}
.sel-cb{position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;box-shadow:var(--shadow-sm)}
.sel-cb.checked{background:var(--brand);border-color:var(--brand)}
.sel-cb.checked::after{content:"✓";color:#fff;font-size:10px;font-weight:700}

.doc-info{padding:10px 12px}
.doc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;color:var(--text)}
.doc-meta-row{display:flex;gap:6px;align-items:center}
.conf-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-full)}
.conf-badge.hi{background:var(--success-bg);color:var(--success)}
.conf-badge.mid{background:var(--warning-bg);color:var(--warning)}
.conf-badge.lo{background:var(--danger-bg);color:var(--danger)}
.doc-date{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* LIST MODE */
.doc-grid.list .doc-card{display:flex;align-items:center}
.doc-grid.list .doc-thumb{width:60px;height:52px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--border-subtle);font-size:22px}
.doc-grid.list .doc-info{display:flex;align-items:center;gap:14px;flex:1;padding:0 14px}
.doc-grid.list .doc-name{flex:1;margin:0}
.doc-grid.list .cat-tag{display:none}

/* PAGER */
.pager{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;justify-content:center;background:var(--bg-surface)}
.pg-btn{padding:6px 12px;border-radius:var(--r-md);font-family:var(--mono);font-size:12px;cursor:pointer;background:var(--bg-raised);border:1px solid var(--border);color:var(--text2);transition:all .12s}
.pg-btn:hover:not(:disabled){border-color:var(--brand-border);color:var(--brand)}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}
.pg-btn.active{background:var(--brand-muted);border-color:var(--brand-border);color:var(--brand);font-weight:600}
.pg-dots{font-family:var(--mono);font-size:12px;color:var(--text3)}

/* EMPTY / LOADING */
.empty-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 20px;grid-column:1/-1;color:var(--text3)}
.empty-icon{font-size:48px;opacity:.2}
.empty-msg{font-size:14px}
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;grid-column:1/-1}
.spin{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DETAIL */
.detail{background:var(--bg-surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3)}
.d-empty-icon{font-size:44px;opacity:.2}
.d-empty p{font-size:13px}

.d-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg-surface);flex-shrink:0}
.d-cat-em{font-size:22px}
.d-title{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;transition:color .12s;border-radius:var(--r-sm)}
.d-close:hover{color:var(--text);background:var(--bg-raised)}

.d-body{flex:1;overflow-y:auto;padding-bottom:0}
.d-sec{padding:16px 20px;border-bottom:1px solid var(--border-subtle)}
.d-sec-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.d-sec-title::after{content:"";flex:1;height:1px;background:var(--border-subtle)}

.pred-wrap{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.pred-class{font-size:20px;font-weight:800;letter-spacing:-.03em}
.pred-path{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:var(--r-full);background:var(--bg-raised);border:1px solid var(--border);color:var(--text3)}
.cbar-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
.cbar-bg{height:5px;background:var(--bg-sunken);border-radius:3px;overflow:hidden}
.cbar-fill{height:5px;border-radius:3px;transition:width .6s}
.cbar-fill.hi{background:linear-gradient(90deg,var(--success),#34D399)}
.cbar-fill.mid{background:linear-gradient(90deg,var(--warning),#FBBF24)}
.cbar-fill.lo{background:linear-gradient(90deg,var(--danger),#F87171)}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-f{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:9px 11px}
.meta-f.full{grid-column:span 2}
.meta-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.meta-v{font-family:var(--mono);font-size:11px;color:var(--text);word-break:break-word;line-height:1.4}

.correct-form{display:flex;gap:7px;margin-top:8px}
.correct-sel{flex:1;padding:8px 10px;background:var(--bg-raised);border:1.5px solid var(--border);border-radius:var(--r-md);color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.correct-sel:focus{border-color:var(--brand)}
.correct-btn{padding:8px 14px;border-radius:var(--r-md);background:var(--brand-muted);border:1px solid var(--brand-border);color:var(--brand);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.correct-btn:hover{background:var(--brand);color:#fff}

/* Extract */
.extract-btn{
  width:100%;padding:10px;border-radius:var(--r-md);
  background:var(--brand-muted);border:1px solid var(--brand-border);
  color:var(--brand);font-family:var(--font);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.extract-btn:hover{background:var(--brand);color:#fff}
.extract-btn:disabled{opacity:.4;cursor:not-allowed}
.extract-source{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:var(--r-full);margin-top:7px;display:inline-flex;align-items:center;gap:4px}
.extract-source.llama,.extract-source.llama3-2{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.extract-source.qwen{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.extract-source.cache{background:var(--bg-sunken);color:var(--text3);border:1px solid var(--border)}
.extract-source.none{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.extract-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);padding:12px 0}

.doc-info-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-bottom:1px solid var(--border-subtle);font-size:12px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;min-width:90px}
.info-v{font-family:var(--mono);font-size:12px;font-weight:500;text-align:right;flex:1;word-break:break-word;color:var(--brand)}
.info-v.empty{color:var(--text4);font-weight:400;font-style:italic}

.ocr-area{background:var(--bg-sunken);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}

.qwen-block{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:var(--r-md);padding:12px}
.qw-head{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.qw-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:var(--r-full);background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);font-weight:600}
.qw-cls{font-size:14px;font-weight:700;color:var(--purple)}
.qw-conf{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}
.qw-reason{font-family:var(--mono);font-size:10px;color:var(--text2);line-height:1.5;margin-top:6px}
.agree-chip2{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--r-full)}
.agree-chip2.yes{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.agree-chip2.no{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}

.scores-mini{display:flex;flex-direction:column;gap:5px}
.sc-row{display:grid;grid-template-columns:110px 1fr 38px;gap:6px;align-items:center}
.sc-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-bg{height:3px;background:var(--bg-sunken);border-radius:2px;overflow:hidden}
.sc-fill{height:3px;border-radius:2px;background:var(--border)}
.sc-fill.top{background:var(--brand)}
.sc-pct{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right}

.d-actions{padding:14px 20px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--bg-surface);flex-shrink:0}
.act-btn{flex:1;padding:10px;border-radius:var(--r-md);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-raised);color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.act-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.act-btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(34,85,204,.3)}
.act-btn.primary:hover{background:var(--brand-dark);box-shadow:0 4px 12px rgba(34,85,204,.4)}
.act-btn.danger{color:var(--danger);border-color:var(--danger-border)}
.act-btn.danger:hover{background:var(--danger-bg);border-color:var(--danger)}

.toasts{position:fixed;bottom:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:7px}
.toast{padding:10px 16px;border-radius:var(--r-md);font-size:13px;background:var(--bg-surface);border:1px solid var(--border);color:var(--text);animation:fadeup .25s ease;max-width:300px;box-shadow:var(--shadow-md)}
.toast.ok{border-color:var(--success-border);background:var(--success-bg);color:var(--success)}
.toast.err{border-color:var(--danger-border);background:var(--danger-bg);color:var(--danger)}
@keyframes fadeup{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

@media(max-width:1200px){.layout{grid-template-columns:240px 1fr}.detail{display:none}.detail.mob{display:flex;position:fixed;inset:60px 0 0 0;z-index:500}}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">
    <div class="logo-mark">BD</div>
    <span class="topbar-title">BankDoc</span>
  </a>
  <span style="font-size:14px;font-weight:600;color:var(--text)">/ Bibliothèque</span>
  <div class="topbar-count" id="total-cnt">—</div>
  <div class="topbar-right">
    <a class="nav-btn" href="index.html">← Classifier</a>
    <a class="nav-btn accent" href="queue.html">⚡ Batch</a>
    <div class="mongo-status" id="mongo-st">
      <span class="stat-dot loading" id="mongo-dot"></span>
      <span id="mongo-txt">MongoDB…</span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-sec">
      <span class="sb-label">Rechercher</span>
      <div class="search-wrap">
        <span class="s-icon">⌕</span>
        <input type="text" id="search" placeholder="Nom, OCR, catégorie…" oninput="onSearch(this.value)"/>
        <button class="s-clear" id="s-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="sb-sec">
      <span class="sb-label">Catégorie</span>
      <div class="filter-list" id="cat-list">
        <div class="fi active" onclick="setCat('')" data-cat="">
          <div class="fi-left"><span class="fi-em">📁</span><span class="fi-name">Tous les documents</span></div>
          <span class="fi-badge" id="cnt-all">—</span>
        </div>
      </div>
    </div>
    <div class="sb-sec">
      <span class="sb-label">Trier par</span>
      <select class="sort-sel" id="sort" onchange="setSort(this.value)">
        <option value="date_desc">Date ↓ (récents)</option>
        <option value="date_asc">Date ↑ (anciens)</option>
        <option value="conf_desc">Confiance ↓</option>
        <option value="conf_asc">Confiance ↑</option>
        <option value="name_asc">Nom A → Z</option>
      </select>
    </div>
    <div class="sb-sec">
      <span class="sb-label">Confiance min. <span id="conf-lbl" style="color:var(--brand);font-weight:700">0%</span></span>
      <div class="range-wrap">
        <input type="range" min="0" max="100" value="0" id="conf-range" oninput="setConf(this.value)"/>
        <div class="range-labels"><span>0%</span><span>50%</span><span>100%</span></div>
      </div>
    </div>
    <div class="sb-scroll">
      <span class="sb-label" style="padding-top:4px;display:block">Statistiques</span>
      <div class="stats-rows" id="stats-mini"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="grid-area">
    <div class="batch-bar" id="batch-bar">
      <span class="batch-count" id="batch-cnt">0 sélectionné(s)</span>
      <button class="batch-btn" onclick="batchDL()">⬇ Télécharger</button>
      <button class="batch-btn danger" onclick="batchDel()">🗑 Supprimer</button>
      <button class="batch-desel" onclick="clearSel()">✕</button>
    </div>
    <div class="grid-toolbar">
      <div class="view-btns">
        <button class="view-btn active" id="vg" onclick="setView('grid')" title="Grille">⊞</button>
        <button class="view-btn" id="vl" onclick="setView('list')" title="Liste">☰</button>
      </div>
      <div class="grid-info" id="grid-info">—</div>
      <button class="sel-all-btn" onclick="toggleSelAll()">☐ Tout sélectionner</button>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="spin-wrap"><div class="spin"></div><span style="font-size:13px;color:var(--text3)">Chargement…</span></div>
    </div>
    <div class="pager" id="pager"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div class="d-empty" id="d-empty">
      <div class="d-empty-icon">👆</div>
      <p>Cliquez sur un document</p>
    </div>
    <div id="d-content" style="display:none;flex-direction:column;height:100%;overflow:hidden">
      <div class="d-header" id="d-hdr"></div>
      <div class="d-body" id="d-body"></div>
      <div class="d-actions" id="d-acts"></div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API="http://localhost:5000";
const DT={
  carte_identite:{emoji:"🪪",label:"Carte d'Identité"},
  rib:{emoji:"🏦",label:"RIB"},
  cheque:{emoji:"💳",label:"Chèque"},
  tableau_amortissement:{emoji:"📊",label:"Tableau d'amortissement"},
  acte_naissance:{emoji:"📜",label:"Acte de naissance"},
  acte_heredite:{emoji:"⚖️",label:"Acte d'hérédité"},
  assurance:{emoji:"🛡️",label:"Assurance"},
  attestation_solde:{emoji:"📋",label:"Attestation de solde"},
};
const FIELD_LABELS={
  carte_identite:{nom:"Nom",prenom:"Prénom",cin_number:"N° CIN",date_naissance:"Date naissance",lieu_naissance:"Lieu naissance",date_delivrance:"Date délivrance",date_expiration:"Date expiration",adresse:"Adresse",sexe:"Sexe"},
  rib:{titulaire:"Titulaire",iban:"IBAN",bic:"BIC",code_banque:"Code banque",code_guichet:"Code guichet",num_compte:"N° compte",cle_rib:"Clé RIB",domiciliation:"Domiciliation",banque:"Banque"},
  cheque:{beneficiaire:"Bénéficiaire",montant_chiffres:"Montant chiffres",montant_lettres:"Montant lettres",date_emission:"Date émission",num_cheque:"N° chèque",tire_sur:"Tiré sur",emetteur:"Émetteur",endossable:"Endossable"},
  tableau_amortissement:{montant_pret:"Montant prêt",taux_interet:"Taux d'intérêt",duree:"Durée",mensualite:"Mensualité",capital_initial:"Capital initial",date_debut:"Date début",nombre_echeances:"Nb échéances",banque:"Banque"},
  acte_naissance:{nom:"Nom",prenom:"Prénom",date_naissance:"Date naissance",heure_naissance:"Heure",lieu_naissance:"Lieu",sexe:"Sexe",pere:"Père",mere:"Mère",num_acte:"N° acte",date_acte:"Date acte"},
  acte_heredite:{defunt:"Défunt(e)",date_deces:"Date décès",lieu_deces:"Lieu décès",heritiers:"Héritiers",notaire:"Notaire",date_acte:"Date acte",lieu_acte:"Lieu acte"},
  assurance:{assure:"Assuré(e)",num_contrat:"N° contrat",type_garantie:"Type garantie",date_effet:"Date d'effet",date_echeance:"Date échéance",prime:"Prime",assureur:"Assureur",agence:"Agence"},
  attestation_solde:{titulaire:"Titulaire",num_compte:"N° compte",solde:"Solde",arrete_au:"Arrêté au",banque:"Banque",agence:"Agence",type_compte:"Type compte"},
};

let S={docs:[],total:0,page:1,perPage:24,pages:1,cat:"",q:"",sort:"date_desc",confMin:0,sel:new Set(),view:"grid",activeId:null};
let searchT=null;

function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('theme',d?'light':'dark');}
(()=>{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');})();

(async()=>{checkMongo();await loadStats();await loadDocs();})();

async function checkMongo(){
  try{
    const r=await fetch(`${API}/status`,{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    document.getElementById('mongo-dot').className=`stat-dot ${d.mongodb?'ok':'err'}`;
    document.getElementById('mongo-txt').textContent=`MongoDB ${d.mongodb?'connecté':'hors ligne'}`;
    document.getElementById('mongo-txt').style.color=d.mongodb?'var(--success)':'var(--danger)';
  }catch{
    document.getElementById('mongo-dot').className='stat-dot err';
    document.getElementById('mongo-txt').textContent='Serveur hors ligne';
    document.getElementById('mongo-txt').style.color='var(--danger)';
  }
}

async function loadStats(){
  try{
    const r=await fetch(`${API}/documents/stats`);const d=await r.json();
    S.allStats=d.stats||[];
    renderSidebar(d.stats||[],d.total||0);
    renderStatsMini(d.stats||[]);
    document.getElementById('total-cnt').textContent=`${d.total||0} document${(d.total||0)!==1?'s':''}`;
  }catch{}
}

async function loadDocs(page=1){
  S.page=page;
  document.getElementById('doc-grid').innerHTML=`<div class="spin-wrap"><div class="spin"></div><span style="font-size:13px;color:var(--text3)">Chargement…</span></div>`;
  try{
    const p=new URLSearchParams({category:S.cat,q:S.q,page,per_page:S.perPage,sort:S.sort,conf_min:S.confMin});
    const r=await fetch(`${API}/documents?${p}`);const d=await r.json();
    if(d.error){gridErr(d.error);return;}
    S.docs=d.documents||[];S.total=d.total;S.pages=d.pages;
    renderGrid();renderPager();gridInfo();
  }catch(e){gridErr(e.message);}
}

function renderSidebar(stats,total){
  const c=document.getElementById('cat-list');
  document.getElementById('cnt-all').textContent=total;
  c.innerHTML=`<div class="fi ${S.cat===''?'active':''}" onclick="setCat('')" data-cat="">
    <div class="fi-left"><span class="fi-em">📁</span><span class="fi-name">Tous les documents</span></div>
    <span class="fi-badge">${total}</span>
  </div>`+stats.map(s=>{const dt=DT[s.category];return`<div class="fi ${S.cat===s.category?'active':''}" onclick="setCat('${esc(s.category)}')" data-cat="${esc(s.category)}">
    <div class="fi-left"><span class="fi-em">${dt?.emoji||'📄'}</span><span class="fi-name">${esc(s.category)}</span></div>
    <span class="fi-badge">${s.count}</span>
  </div>`;}).join('');
}

function renderStatsMini(stats){
  const c=document.getElementById('stats-mini');
  c.innerHTML=stats.map(s=>`<div class="stat-row" onclick="setCat('${esc(s.category)}')">
    <span class="stat-cat">${esc(s.category)}</span>
    <span class="stat-avg" style="color:${s.avg_confidence>=80?'var(--success)':s.avg_confidence>=60?'var(--warning)':'var(--danger)'}">${s.avg_confidence.toFixed(0)}%</span>
  </div>`).join('');
}

function renderGrid(){
  const g=document.getElementById('doc-grid');
  g.className=`doc-grid ${S.view==='list'?'list':''}`;
  if(!S.docs.length){g.innerHTML=`<div class="empty-center"><div class="empty-icon">🔍</div><p class="empty-msg">${S.q?`Aucun résultat pour «${esc(S.q)}»`:'Aucun document ici'}</p></div>`;return;}
  g.innerHTML=S.docs.map(d=>card(d)).join('');
}

function card(doc){
  const dt=DT[doc.prediction];const cc=cconf(doc.confidence);const sel=S.sel.has(doc._id);const act=S.activeId===doc._id;
  return`<div class="doc-card ${sel?'selected':''} ${act?'active':''}" id="c-${doc._id}" onclick="openDetail('${doc._id}')">
    <div class="doc-thumb">
      <span>${dt?.emoji||'📄'}</span>
      <div class="cat-tag">${esc(doc.prediction)}</div>
      <div class="sel-cb ${sel?'checked':''}" onclick="event.stopPropagation();toggleSel('${doc._id}')"></div>
    </div>
    <div class="doc-info">
      <div class="doc-name" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div>
      <div class="doc-meta-row">
        <span class="conf-badge ${cc}">${(doc.confidence||0).toFixed(0)}%</span>
        <span class="doc-date">${fmtS(doc.uploaded_at)}</span>
      </div>
    </div>
  </div>`;
}

function renderPager(){
  const bar=document.getElementById('pager');
  if(S.pages<=1){bar.innerHTML='';return;}
  const p=S.page,t=S.pages;
  const range=[];
  for(let i=1;i<=t;i++){if(i===1||i===t||Math.abs(i-p)<=1)range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  bar.innerHTML=`<button class="pg-btn" onclick="loadDocs(${p-1})" ${p<=1?'disabled':''}>← Préc.</button>${range.map(r=>r==='…'?`<span class="pg-dots">…</span>`:`<button class="pg-btn ${r===p?'active':''}" onclick="loadDocs(${r})">${r}</button>`).join('')}<button class="pg-btn" onclick="loadDocs(${p+1})" ${p>=t?'disabled':''}>Suiv. →</button>`;
}

function gridInfo(){const s=(S.page-1)*S.perPage+1,e=Math.min(S.page*S.perPage,S.total);document.getElementById('grid-info').textContent=`${s}–${e} sur ${S.total}`;}
function gridErr(msg){document.getElementById('doc-grid').innerHTML=`<div class="empty-center"><div class="empty-icon">⚠️</div><p class="empty-msg">${esc(msg)}</p></div>`;}

async function openDetail(id){
  S.activeId=id;
  document.querySelectorAll('.doc-card').forEach(c=>{c.classList.remove('active');});
  document.getElementById(`c-${id}`)?.classList.add('active');
  document.getElementById('d-empty').style.display='none';
  const dc=document.getElementById('d-content');dc.style.display='flex';
  document.getElementById('d-body').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px;gap:12px"><div class="spin"></div><span style="font-size:13px;color:var(--text3)">Chargement…</span></div>`;
  document.getElementById('detail').classList.add('mob');
  try{const r=await fetch(`${API}/documents/${id}`);const doc=await r.json();renderDetail(doc);}
  catch(e){document.getElementById('d-body').innerHTML=`<div style="padding:16px;font-size:13px;color:var(--danger)">Erreur: ${esc(e.message)}</div>`;}
}

function renderDetail(doc){
  const dt=DT[doc.prediction];const cc=cconf(doc.confidence);const ocr=doc.ocr_text||'';
  document.getElementById('d-hdr').innerHTML=`<span class="d-cat-em">${dt?.emoji||'📄'}</span><div class="d-title" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div><button class="d-close" onclick="closeDetail()">✕</button>`;
  document.getElementById('d-acts').innerHTML=`<button class="act-btn primary" onclick="dlDoc('${doc._id}','${esc(doc.original_filename)}')">⬇ Télécharger</button><button class="act-btn danger" onclick="delDoc('${doc._id}')">🗑 Supprimer</button>`;
  const SUPPORTED=['carte_identite','rib','cheque','tableau_amortissement','acte_naissance','acte_heredite','assurance','attestation_solde'];
  const supE=SUPPORTED.includes(doc.prediction);
  const cached=doc.extracted_fields;const hasCache=cached&&Object.values(cached).some(v=>v);
  const qwenH=doc.qwen?.class?`<div class="d-sec"><div class="d-sec-title">Qwen2.5-VL</div><div class="qwen-block"><div class="qw-head"><span class="qw-tag">🔮 qwen</span><span class="qw-cls">${esc(doc.qwen.class)}</span><span class="qw-conf">${((doc.qwen.confidence||0)*100).toFixed(0)}%</span></div>${doc.qwen.reasoning?`<div class="qw-reason">${esc(doc.qwen.reasoning.substring(0,180))}</div>`:''}<div class="agree-chip2 ${doc.qwen.class===doc.prediction?'yes':'no'}">${doc.qwen.class===doc.prediction?'✓ Accord':'⚠ Désaccord'}</div></div></div>`:''
  const scH=doc.all_scores?.length?`<div class="d-sec"><div class="d-sec-title">Scores modèle</div><div class="scores-mini">${doc.all_scores.map((s,i)=>`<div class="sc-row"><div class="sc-name">${esc(s.class)}</div><div class="sc-bg"><div class="sc-fill ${i===0?'top':''}" style="width:${(s.score*100).toFixed(0)}%"></div></div><div class="sc-pct">${(s.score*100).toFixed(1)}%</div></div>`).join('')}</div></div>`:''
  document.getElementById('d-body').innerHTML=`
    <div class="d-sec">
      <div class="d-sec-title">Classification</div>
      <div class="pred-wrap"><div class="pred-class">${dt?.emoji||'📄'} ${esc(doc.prediction)}</div><div class="pred-path">${esc(doc.path||'direct')}</div></div>
      <div class="cbar-lbl"><span>Confiance</span><span style="color:${cc==='hi'?'var(--success)':cc==='mid'?'var(--warning)':'var(--danger)'};font-weight:700">${(doc.confidence||0).toFixed(1)}%</span></div>
      <div class="cbar-bg"><div class="cbar-fill ${cc}" style="width:${Math.min(doc.confidence||0,100)}%"></div></div>
      <div style="margin-top:12px"><div class="meta-lbl" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:6px">Corriger la catégorie</div>
      <div class="correct-form">
        <select class="correct-sel" id="cs-${doc._id}">${Object.keys(DT).map(k=>`<option value="${k}" ${k===doc.prediction?'selected':''}>${DT[k].emoji} ${k}</option>`).join('')}<option value="inconnu" ${doc.prediction==='inconnu'?'selected':''}>❓ inconnu</option></select>
        <button class="correct-btn" onclick="correctCat('${doc._id}')">✓ Corriger</button>
      </div></div>
    </div>
    <div class="d-sec">
      <div class="d-sec-title">Métadonnées</div>
      <div class="meta-grid">
        <div class="meta-f"><div class="meta-lbl">Fichier</div><div class="meta-v">${esc(doc.original_filename)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Taille</div><div class="meta-v">${fmtSz(doc.file_size_bytes)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Déposé le</div><div class="meta-v">${fmtF(doc.uploaded_at)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Traitement</div><div class="meta-v">${doc.time_ms?doc.time_ms+' ms':'—'}</div></div>
        <div class="meta-f full"><div class="meta-lbl">ID MongoDB</div><div class="meta-v" style="font-size:10px;color:var(--text3)">${esc(doc._id)}</div></div>
      </div>
    </div>
    ${supE?`<div class="d-sec" id="extract-sec">
      <div class="d-sec-title">${dt?.emoji||'📄'} ${esc(dt?.label||doc.prediction)} <span id="extract-count" style="font-size:10px;color:var(--text3);margin-left:auto;font-weight:400;letter-spacing:0;text-transform:none"></span></div>
      <div id="extract-body">${hasCache?renderExtractedFields(cached,doc.extraction_source||'',doc.prediction):`<button class="extract-btn" id="extract-btn" onclick="runExtract('${doc._id}','${doc.prediction}')">🤖 Extraire les informations via IA</button>`}</div>
    </div>`:''}
    ${qwenH}
    ${scH}
    ${ocr?`<div class="d-sec"><div class="d-sec-title">Texte OCR</div><div class="ocr-area">${esc(ocr)}</div></div>`:''}
  `;
}

function renderExtractedFields(fields,source,docType){
  const labels=FIELD_LABELS[docType]||{};
  const entries=Object.entries(fields);
  if(!entries.length)return`<p style="font-size:13px;color:var(--text3)">Aucun champ disponible.</p>`;
  const filled=entries.filter(([,v])=>v).length;
  setTimeout(()=>{const el=document.getElementById('extract-count');if(el)el.textContent=`${filled}/${entries.length} champs`;},0);
  const sLabel={'llama3':'🦙 llama3.2','llama3.2':'🦙 llama3.2',qwen:'🔮 Qwen2.5-VL',cache:'💾 cache',none:'—'}[source]||source;
  const sCls={'llama3':'llama','llama3.2':'llama',qwen:'qwen',cache:'cache',none:'none'}[source]||'cache';
  return`<div class="doc-info-card">${entries.map(([k,v])=>`<div class="info-row"><span class="info-key">${esc(labels[k]||k)}</span><span class="info-v ${v?'':'empty'}">${v?esc(String(v)):'—'}</span></div>`).join('')}</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
    <span class="extract-source ${sCls}">Source : ${sLabel}</span>
    <button class="extract-btn" style="width:auto;padding:5px 12px;font-size:11px" onclick="runExtract('${S.activeId}','${docType}',true)">↺ Ré-extraire</button>
  </div>`;
}

async function runExtract(docId,docType,force=false){
  const body=document.getElementById('extract-body');if(!body)return;
  body.innerHTML=`<div class="extract-loading"><div class="spin" style="width:18px;height:18px;border-width:2px"></div>Extraction en cours… (llama3.2, peut prendre 10–30s)</div>`;
  try{
    const r=await fetch(`${API}/documents/${docId}/extract`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({force})});
    const d=await r.json();
    if(d.error){body.innerHTML=`<p style="font-size:13px;color:var(--danger);margin-bottom:8px">⚠ ${esc(d.error)}</p><button class="extract-btn" onclick="runExtract('${docId}','${docType}')">↺ Réessayer</button>`;return;}
    const filled=Object.values(d.fields||{}).filter(v=>v).length;
    toast(`✅ ${filled} champs extraits via ${d.source}`,'ok');
    body.innerHTML=renderExtractedFields(d.fields||{},d.source,docType);
  }catch(e){body.innerHTML=`<p style="font-size:13px;color:var(--danger);margin-bottom:8px">⚠ Erreur : ${esc(e.message)}</p><button class="extract-btn" onclick="runExtract('${docId}','${docType}')">↺ Réessayer</button>`;}
}

function closeDetail(){S.activeId=null;document.getElementById('d-empty').style.display='flex';document.getElementById('d-content').style.display='none';document.querySelectorAll('.doc-card').forEach(c=>c.classList.remove('active'));document.getElementById('detail').classList.remove('mob');}

async function correctCat(id){
  const sel=document.getElementById(`cs-${id}`);if(!sel)return;
  try{const r=await fetch(`${API}/documents/${id}/correct`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({prediction:sel.value})});const d=await r.json();if(d.success){toast('✅ Catégorie corrigée','ok');await loadStats();await loadDocs(S.page);}else toast('Erreur: '+(d.error||'?'),'err');}
  catch{toast('Erreur réseau','err');}
}

function setCat(cat){S.cat=cat;S.page=1;document.querySelectorAll('.fi').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));loadDocs(1);}
function setSort(v){S.sort=v;loadDocs(1);}
function setConf(v){S.confMin=parseInt(v);document.getElementById('conf-lbl').textContent=v+'%';clearTimeout(searchT);searchT=setTimeout(()=>loadDocs(1),400);}
function onSearch(v){document.getElementById('s-clear').style.display=v?'block':'none';clearTimeout(searchT);searchT=setTimeout(()=>{S.q=v;loadDocs(1);},350);}
function clearSearch(){document.getElementById('search').value='';document.getElementById('s-clear').style.display='none';S.q='';loadDocs(1);}
function setView(v){S.view=v;document.getElementById('vg').classList.toggle('active',v==='grid');document.getElementById('vl').classList.toggle('active',v==='list');renderGrid();}
function toggleSel(id){S.sel.has(id)?S.sel.delete(id):S.sel.add(id);const c=document.getElementById(`c-${id}`);c?.classList.toggle('selected',S.sel.has(id));c?.querySelector('.sel-cb')?.classList.toggle('checked',S.sel.has(id));updateBatch();}
function toggleSelAll(){S.sel.size===S.docs.length?S.sel.clear():S.docs.forEach(d=>S.sel.add(d._id));renderGrid();updateBatch();}
function clearSel(){S.sel.clear();renderGrid();updateBatch();}
function updateBatch(){const n=S.sel.size;document.getElementById('batch-bar').classList.toggle('show',n>0);document.getElementById('batch-cnt').textContent=`${n} sélectionné${n>1?'s':''}`;}
async function batchDel(){if(!S.sel.size)return;if(!confirm(`Supprimer ${S.sel.size} document(s) ?`))return;let ok=0,fail=0;for(const id of[...S.sel]){try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();d.success?ok++:fail++;}catch{fail++;}}S.sel.clear();updateBatch();toast(`🗑 ${ok} supprimé(s)${fail?', '+fail+' erreur(s)':''}`,ok>0?'ok':'err');closeDetail();await loadStats();await loadDocs(1);}
async function batchDL(){for(const id of[...S.sel]){const doc=S.docs.find(d=>d._id===id);if(doc){await new Promise(r=>setTimeout(r,200));const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=doc.original_filename;a.click();}}toast('⬇ Téléchargements démarrés','ok');}
async function dlDoc(id,fn){const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=fn;a.click();toast('⬇ Téléchargement démarré','ok');}
async function delDoc(id){if(!confirm('Supprimer ce document ?'))return;try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();if(d.success){toast('🗑 Supprimé','ok');closeDetail();await loadStats();await loadDocs(S.page);}else toast('Erreur: '+(d.error||'?'),'err');}catch{toast('Erreur réseau','err');}}
function cconf(c){return c>=80?'hi':c>=60?'mid':'lo';}
function fmtS(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}
function fmtF(iso){if(!iso)return'—';return new Date(iso).toLocaleString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtSz(b){if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='ok'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);}
</script>
</body>
</html>
