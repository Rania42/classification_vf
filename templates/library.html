<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BankDoc — Bibliothèque</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F6F8;--surface:#FFFFFF;--surface2:#F0F2F7;--surface3:#E8EBF2;
  --brand:#1A2E6B;--brand2:#253D8A;--brand-light:rgba(26,46,107,0.08);--brand-border:rgba(26,46,107,0.2);
  --success:#0C6B4E;--success-bg:rgba(12,107,78,0.07);--success-border:rgba(12,107,78,0.18);
  --warning:#7A4500;--warning-bg:rgba(122,69,0,0.07);--warning-border:rgba(122,69,0,0.18);
  --danger:#8B1A1A;--danger-bg:rgba(139,26,26,0.07);--danger-border:rgba(139,26,26,0.18);
  --text:#0D1117;--text2:#3D4A5C;--text3:#6B7A8D;--text4:#9AAAB8;
  --border:#D8DDE8;--border-subtle:#EDF0F7;
  --shadow-md:0 4px 16px rgba(13,17,23,0.08);--shadow-lg:0 12px 40px rgba(13,17,23,0.12);
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'IBM Plex Serif',serif;
}
[data-theme="dark"]{
  --bg:#0A0D14;--surface:#111520;--surface2:#171C2B;--surface3:#1D2336;
  --brand:#4A6ED4;--brand2:#5A80E0;--brand-light:rgba(74,110,212,0.12);--brand-border:rgba(74,110,212,0.25);
  --success:#1DB87A;--success-bg:rgba(29,184,122,0.08);--success-border:rgba(29,184,122,0.2);
  --warning:#D4870A;--warning-bg:rgba(212,135,10,0.08);--warning-border:rgba(212,135,10,0.2);
  --danger:#E05050;--danger-bg:rgba(224,80,80,0.08);--danger-border:rgba(224,80,80,0.2);
  --text:#E4EAF4;--text2:#8A9BB8;--text3:#5A6B84;--text4:#384456;
  --border:#1E2840;--border-subtle:#141A28;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.nav{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:0;flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:32px}
.nav-logo{width:28px;height:28px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:16px;height:16px;fill:#fff}
.nav-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--text);letter-spacing:.01em}
.nav-sep{width:1px;height:16px;background:var(--border);margin:0 20px}
.nav-links{display:flex;gap:2px}
.nav-link{padding:6px 12px;font-size:13px;color:var(--text3);text-decoration:none;letter-spacing:.01em;border-bottom:2px solid transparent;transition:color .15s}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:500}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-chip{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text3);padding:4px 10px;border:1px solid var(--border);background:var(--surface2)}
.dot{width:6px;height:6px;border-radius:50%}
.dot.ok{background:var(--success)}.dot.err{background:var(--danger)}.dot.pulse{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.theme-toggle{width:28px;height:28px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px}

/* LAYOUT */
.workspace{flex:1;display:grid;grid-template-columns:260px 1fr 380px;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:14px 16px;border-bottom:1px solid var(--border-subtle)}
.sb-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:8px}
.search-box{position:relative}
.search-box input{width:100%;padding:8px 32px 8px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--brand)}
.search-box input::placeholder{color:var(--text4)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;display:none}
.cat-list{display:flex;flex-direction:column;gap:1px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.cat-item:hover{background:var(--surface2)}
.cat-item.active{background:var(--brand-light);border-left-color:var(--brand)}
.cat-item-name{font-size:12px;color:var(--text2);font-weight:500}
.cat-item.active .cat-item-name{color:var(--brand)}
.cat-item-count{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 6px}
.cat-item.active .cat-item-count{background:var(--brand-light);color:var(--brand)}
.sort-select{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;outline:none;cursor:pointer}
.range-row{display:flex;flex-direction:column;gap:5px}
.range-val{font-family:var(--mono);font-size:11px;color:var(--brand);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--surface3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--brand);border-radius:50%;cursor:pointer}
.sb-scroll{flex:1;overflow-y:auto;padding:14px 16px}
.stats-mini{display:flex;flex-direction:column;gap:2px}
.stat-mini-row{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.stat-mini-row:hover{background:var(--surface2);border-left-color:var(--brand)}
.smr-name{font-size:11px;color:var(--text2)}
.smr-conf{font-family:var(--mono);font-size:11px;font-weight:500}
.smr-conf.hi{color:var(--success)}.smr-conf.mid{color:var(--warning)}.smr-conf.lo{color:var(--danger)}

/* CENTER */
.center{display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:8px;flex-shrink:0}
.view-toggle{display:flex;gap:1px;background:var(--surface3);padding:2px}
.vt-btn{padding:5px 10px;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;transition:all .12s}
.vt-btn.active{background:var(--surface);color:var(--brand)}
.toolbar-info{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}
.sel-all{padding:5px 10px;background:none;border:1px solid var(--border);color:var(--text3);font-size:11px;cursor:pointer;transition:all .12s}
.sel-all:hover{border-color:var(--brand);color:var(--brand)}
.batch-bar{display:none;align-items:center;gap:8px;padding:8px 16px;background:var(--brand-light);border-bottom:1px solid var(--brand-border)}
.batch-bar.show{display:flex}
.batch-count{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--brand)}
.batch-btn{padding:5px 12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .12s;font-family:var(--mono)}
.batch-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.batch-btn.danger:hover{border-color:var(--danger-border);color:var(--danger);background:var(--danger-bg)}
.batch-dismiss{background:none;border:none;color:var(--text3);cursor:pointer;margin-left:auto;font-size:14px}
.doc-grid{flex:1;overflow-y:auto;padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;align-content:start}
.doc-grid.list-mode{grid-template-columns:1fr;gap:4px}
.doc-card{background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.doc-card:hover{border-color:var(--brand-border);box-shadow:var(--shadow-md)}
.doc-card.selected{border-color:var(--brand);background:var(--brand-light)}
.doc-card.active{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-light)}
.doc-thumb{height:90px;background:var(--surface3);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-subtle);position:relative}
.doc-thumb-icon{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.doc-thumb-icon svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:1.5}
.doc-type-tag{position:absolute;bottom:5px;left:5px;font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;background:rgba(255,255,255,.9);border:1px solid var(--border);color:var(--text2)}
[data-theme="dark"] .doc-type-tag{background:rgba(17,21,32,.9)}
.doc-sel-cb{position:absolute;top:6px;right:6px;width:16px;height:16px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.doc-sel-cb.checked{background:var(--brand);border-color:var(--brand)}
.doc-sel-cb.checked::after{content:"✓";color:#fff;font-size:9px;font-weight:700}
.doc-info{padding:9px 10px}
.doc-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.doc-meta{display:flex;align-items:center;gap:5px}
.conf-tag{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;border:1px solid}
.conf-tag.hi{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.conf-tag.mid{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border)}
.conf-tag.lo{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.doc-date{font-family:var(--mono);font-size:9px;color:var(--text4)}
.doc-grid.list-mode .doc-card{display:flex;align-items:center}
.doc-grid.list-mode .doc-thumb{width:52px;height:44px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--border-subtle)}
.doc-grid.list-mode .doc-info{display:flex;align-items:center;gap:12px;flex:1;padding:0 12px}
.doc-grid.list-mode .doc-name{flex:1;margin:0}
.doc-grid.list-mode .doc-type-tag{display:none}
.pager{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:4px;justify-content:center;flex-shrink:0}
.pg-btn{padding:5px 10px;font-family:var(--mono);font-size:11px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text2);transition:all .12s}
.pg-btn:hover:not(:disabled){border-color:var(--brand-border);color:var(--brand)}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}
.pg-btn.active{background:var(--brand-light);border-color:var(--brand-border);color:var(--brand);font-weight:500}
.pg-ellipsis{font-family:var(--mono);font-size:11px;color:var(--text3);padding:0 4px}
.grid-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px;grid-column:1/-1;color:var(--text3)}
.grid-empty-icon{width:40px;height:40px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto}
.grid-empty-icon svg{width:20px;height:20px;stroke:var(--text4);fill:none;stroke-width:1.5}

/* DETAIL */
.detail{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.detail-empty-icon{width:36px;height:36px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.detail-empty-icon svg{width:18px;height:18px;stroke:var(--text4);fill:none;stroke-width:1.5}
.detail-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surface)}
.detail-title{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.detail-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px;transition:color .12s}
.detail-close:hover{color:var(--text)}
.detail-body{flex:1;overflow-y:auto}
.d-section{padding:14px 16px;border-bottom:1px solid var(--border-subtle)}
.d-section:last-child{border-bottom:none}
.d-sec-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.d-sec-label::before{content:"";width:2px;height:10px;background:var(--brand)}
.pred-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pred-class{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--text)}
.pred-path{font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--border);color:var(--text3);background:var(--surface2)}
.conf-row{display:flex;flex-direction:column;gap:4px}
.conf-labels{display:flex;justify-content:space-between;font-size:11px}
.conf-label{color:var(--text3)}.conf-val{font-family:var(--mono);font-weight:500}
.conf-val.hi{color:var(--success)}.conf-val.mid{color:var(--warning)}.conf-val.lo{color:var(--danger)}
.cbar{height:3px;background:var(--surface3)}
.cbar-fill{height:3px;transition:width .6s}
.cbar-fill.hi{background:var(--success)}.cbar-fill.mid{background:var(--warning)}.cbar-fill.lo{background:var(--danger)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.meta-cell{background:var(--surface2);border:1px solid var(--border-subtle);padding:8px 10px}
.meta-cell.full{grid-column:span 2}
.meta-key{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:3px}
.meta-val{font-family:var(--mono);font-size:11px;color:var(--text);word-break:break-all;line-height:1.4}

/* LLM VERDICTS in detail panel */
.llm-verdicts{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.llm-verdict-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);background:var(--surface2);font-size:12px}
.llm-verdict-name{font-weight:500;display:flex;align-items:center;gap:6px}
.llm-verdict-pred{font-family:var(--mono);font-size:11px;color:var(--text3)}
.llm-v-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border:1px solid}
.llm-v-badge.agree{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.llm-v-badge.disagree{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.llm-v-badge.unavail{background:var(--surface3);color:var(--text3);border-color:var(--border)}

/* CORRECTION FORM */
.correction-form{display:flex;flex-direction:column;gap:10px}
.correction-tabs{display:flex;gap:2px;background:var(--surface3);padding:2px}
.ct-btn{flex:1;padding:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:all .15s;font-family:var(--font)}
.ct-btn.active{background:var(--surface);color:var(--brand);font-weight:600}
.corr-select{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border-color .15s}
.corr-select:focus{border-color:var(--brand)}
.new-type-fields{display:flex;flex-direction:column;gap:8px}
.field-input{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--brand)}
.field-hint{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.slug-prev{font-family:var(--mono);font-size:11px;color:var(--brand);margin-top:2px;display:none}
.info-box{background:var(--brand-light);border:1px solid var(--brand-border);padding:9px 11px;font-size:11px;color:var(--text2);line-height:1.5}
.corr-btn{width:100%;padding:10px;background:var(--brand);color:#fff;border:none;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:background .15s}
.corr-btn:hover{background:var(--brand2)}
.corr-btn:disabled{opacity:.4;cursor:not-allowed}

/* EXTRACT */
.extract-btn{width:100%;padding:9px;background:var(--brand-light);border:1px solid var(--brand-border);color:var(--brand);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.extract-btn:hover{background:var(--brand);color:#fff}
.extract-btn:disabled{opacity:.4;cursor:not-allowed}
.fields-table{width:100%;border-collapse:collapse}
.fields-table tr{border-bottom:1px solid var(--border-subtle)}
.fields-table tr:last-child{border-bottom:none}
.fields-table td{padding:7px 10px;font-size:11px}
.ft-key{color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono)}
.ft-val{font-family:var(--mono);color:var(--brand);text-align:right}
.ft-val.empty{color:var(--text4);font-style:italic}
.source-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;display:inline-flex;align-items:center;gap:4px;margin-top:6px;border:1px solid var(--border)}
.source-badge.llama{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.source-badge.qwen{background:rgba(61,31,122,0.07);color:#3D1F7A;border-color:rgba(61,31,122,0.18)}
.source-badge.cache{background:var(--surface2);color:var(--text3)}
.extract-error{font-size:12px;color:var(--danger);padding:8px 10px;background:var(--danger-bg);border:1px solid var(--danger-border);margin-bottom:8px}

/* SCORES MINI */
.scores-mini{display:flex;flex-direction:column;gap:4px}
.sc-row{display:grid;grid-template-columns:110px 1fr 36px;gap:5px;align-items:center}
.sc-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-bg{height:3px;background:var(--surface3)}.sc-fill{height:3px;background:var(--border)}.sc-fill.top{background:var(--brand)}
.sc-pct{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right}
.ocr-text{background:var(--surface2);border:1px solid var(--border);padding:10px;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;max-height:120px;overflow-y:auto;white-space:pre-wrap}

.detail-actions{padding:12px 16px;display:flex;gap:6px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.act-btn{flex:1;padding:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.act-btn:hover{border-color:var(--brand-border);color:var(--brand)}
.act-btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.act-btn.primary:hover{background:var(--brand2)}
.act-btn.danger:hover{color:var(--danger);border-color:var(--danger-border);background:var(--danger-bg)}

.toasts{position:fixed;bottom:16px;right:16px;z-index:9000;display:flex;flex-direction:column;gap:4px}
.toast{padding:9px 14px;font-size:12px;background:var(--surface);border:1px solid var(--border);animation:fadeup .2s ease}
.toast.ok{border-left:2px solid var(--success);color:var(--success)}
.toast.err{border-left:2px solid var(--danger);color:var(--danger)}
@keyframes fadeup{from{transform:translateY(4px);opacity:0}to{transform:none;opacity:1}}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1100px){.workspace{grid-template-columns:240px 1fr}.detail{display:none}.detail.show{display:flex;position:fixed;inset:52px 0 0 0;z-index:200}}
@media(max-width:700px){.workspace{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="dashboard.html">
    <div class="nav-logo"><svg viewBox="0 0 16 16"><path d="M1 3h14v2H1zM1 7h14v6H1z"/></svg></div>
    <span class="nav-title">BankDoc</span>
  </a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">Tableau de bord</a>
    <a class="nav-link" href="queue.html">Traitement par lot</a>
    <a class="nav-link" href="index.html">Analyse unitaire</a>
    <a class="nav-link active" href="library.html">Bibliothèque</a>
    <a class="nav-link" href="retrain.html">Modèle</a>
  </div>
  <div class="nav-right">
    <div class="status-chip" id="total-chip">— documents</div>
    <div class="status-chip"><span class="dot pulse" id="dot-mongo"></span><span id="txt-mongo">MongoDB…</span></div>
    <button class="theme-toggle" onclick="toggleTheme()">◐</button>
  </div>
</nav>

<div class="workspace">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <span class="sb-label">Rechercher</span>
      <div class="search-box">
        <input type="text" id="search" placeholder="Nom, OCR, catégorie…" oninput="onSearch(this.value)"/>
        <button class="search-clear" id="s-clear" onclick="clearSearch()">×</button>
      </div>
    </div>
    <div class="sb-section">
      <span class="sb-label">Catégorie</span>
      <div class="cat-list" id="cat-list">
        <div class="cat-item active" onclick="setCat('')" data-cat=""><span class="cat-item-name">Tous les documents</span><span class="cat-item-count" id="cnt-all">—</span></div>
      </div>
    </div>
    <div class="sb-section">
      <span class="sb-label">Trier par</span>
      <select class="sort-select" id="sort" onchange="setSort(this.value)">
        <option value="date_desc">Date — récents en premier</option>
        <option value="date_asc">Date — anciens en premier</option>
        <option value="conf_desc">Confiance décroissante</option>
        <option value="conf_asc">Confiance croissante</option>
        <option value="name_asc">Nom A → Z</option>
      </select>
    </div>
    <div class="sb-section">
      <span class="sb-label">Confiance minimum &mdash; <span class="range-val" id="conf-val">0%</span></span>
      <div class="range-row">
        <input type="range" min="0" max="100" value="0" id="conf-range" oninput="setConf(this.value)"/>
      </div>
    </div>
    <div class="sb-scroll">
      <span class="sb-label">Statistiques par catégorie</span>
      <div class="stats-mini" id="stats-mini"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="batch-bar" id="batch-bar">
      <span class="batch-count" id="batch-cnt">0 sélectionné(s)</span>
      <button class="batch-btn" onclick="batchDL()">Télécharger</button>
      <button class="batch-btn danger" onclick="batchDel()">Supprimer</button>
      <button class="batch-dismiss" onclick="clearSel()">×</button>
    </div>
    <div class="toolbar">
      <div class="view-toggle">
        <button class="vt-btn active" id="vg" onclick="setView('grid')">⊞</button>
        <button class="vt-btn" id="vl" onclick="setView('list')">☰</button>
      </div>
      <div class="toolbar-info" id="toolbar-info">—</div>
      <button class="sel-all" onclick="toggleSelAll()">Tout sélectionner</button>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="grid-empty"><div class="spin"></div></div>
    </div>
    <div class="pager" id="pager"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div class="detail-empty" id="d-empty">
      <div class="detail-empty-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <div style="font-size:12px;color:var(--text4)">Sélectionnez un document</div>
    </div>
    <div id="d-content" style="display:none;flex-direction:column;height:100%;overflow:hidden">
      <div class="detail-header" id="d-header"></div>
      <div class="detail-body" id="d-body"></div>
      <div class="detail-actions" id="d-actions"></div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API='http://localhost:5000';
const TYPE_LABELS={carte_identite:"Carte d'Identité",rib:"RIB",cheque:"Chèque",tableau_amortissement:"Tableau d'amortissement",acte_naissance:"Acte de naissance",acte_heredite:"Acte d'hérédité",assurance:"Assurance",attestation_solde:"Attestation de solde"};
const FIELD_LABELS={
  carte_identite:{nom:"Nom",prenom:"Prénom",cin_number:"N° CIN",date_naissance:"Naissance",lieu_naissance:"Lieu naissance",date_delivrance:"Délivrance",date_expiration:"Expiration",adresse:"Adresse",sexe:"Sexe"},
  rib:{titulaire:"Titulaire",iban:"IBAN",bic:"BIC",code_banque:"Code banque",code_guichet:"Code guichet",num_compte:"N° compte",cle_rib:"Clé RIB",domiciliation:"Domiciliation",banque:"Banque"},
  cheque:{beneficiaire:"Bénéficiaire",montant_chiffres:"Montant",montant_lettres:"En lettres",date_emission:"Date",num_cheque:"N° chèque",tire_sur:"Tiré sur",emetteur:"Émetteur",endossable:"Endossable"},
  tableau_amortissement:{montant_pret:"Montant prêt",taux_interet:"Taux",duree:"Durée",mensualite:"Mensualité",capital_initial:"Capital",date_debut:"Début",nombre_echeances:"Échéances",banque:"Banque"},
  acte_naissance:{nom:"Nom",prenom:"Prénom",date_naissance:"Naissance",heure_naissance:"Heure",lieu_naissance:"Lieu",sexe:"Sexe",pere:"Père",mere:"Mère",num_acte:"N° acte",date_acte:"Date acte"},
  acte_heredite:{defunt:"Défunt(e)",date_deces:"Décès",lieu_deces:"Lieu décès",heritiers:"Héritiers",notaire:"Notaire",date_acte:"Date acte",lieu_acte:"Lieu acte"},
  assurance:{assure:"Assuré(e)",num_contrat:"N° contrat",type_garantie:"Garantie",date_effet:"Effet",date_echeance:"Échéance",prime:"Prime",assureur:"Assureur",agence:"Agence"},
  attestation_solde:{titulaire:"Titulaire",num_compte:"N° compte",solde:"Solde",arrete_au:"Arrêté au",banque:"Banque",agence:"Agence",type_compte:"Type compte"},
};

let S={docs:[],total:0,page:1,perPage:24,pages:1,cat:'',q:'',sort:'date_desc',confMin:0,sel:new Set(),view:'grid',activeId:null,allTypes:[]};
let searchT=null;

function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');localStorage.setItem('theme',d?'light':'dark');}
(()=>{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');})();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function confCls(c){return c>=80?'hi':c>=60?'mid':'lo';}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}
function fmtFull(iso){if(!iso)return'—';return new Date(iso).toLocaleString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtSz(b){if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

(async()=>{checkMongo();await loadStats();await loadDocs();await loadAllTypes();})();

async function checkMongo(){
  try{const r=await fetch(`${API}/status`,{signal:AbortSignal.timeout(4000)});const d=await r.json();
  document.getElementById('dot-mongo').className=`dot ${d.mongodb?'ok':'err'}`;
  document.getElementById('txt-mongo').textContent=d.mongodb?'MongoDB connecté':'MongoDB hors ligne';
  document.getElementById('txt-mongo').style.color=d.mongodb?'var(--success)':'var(--danger)';}
  catch{document.getElementById('dot-mongo').className='dot err';document.getElementById('txt-mongo').textContent='Serveur hors ligne';}
}
async function loadAllTypes(){
  try{const r=await fetch(`${API}/types`);const d=await r.json();S.allTypes=d.types||[];}catch{}
}
async function loadStats(){
  try{
    const r=await fetch(`${API}/documents/stats`);const d=await r.json();
    S.allStats=d.stats||[];
    renderSidebar(d.stats||[],d.total||0);
    renderStatsMini(d.stats||[]);
    document.getElementById('total-chip').textContent=`${d.total||0} document${d.total!==1?'s':''}`;
  }catch{}
}
async function loadDocs(page=1){
  S.page=page;
  document.getElementById('doc-grid').innerHTML=`<div class="grid-empty"><div class="spin"></div></div>`;
  try{
    const p=new URLSearchParams({category:S.cat,q:S.q,page,per_page:S.perPage,sort:S.sort,conf_min:S.confMin});
    const r=await fetch(`${API}/documents?${p}`);const d=await r.json();
    if(d.error){gridErr(d.error);return;}
    S.docs=d.documents||[];S.total=d.total;S.pages=d.pages;
    renderGrid();renderPager();
    const s=(page-1)*S.perPage+1,e=Math.min(page*S.perPage,S.total);
    document.getElementById('toolbar-info').textContent=S.total?`${s}–${e} sur ${S.total}`:'Aucun résultat';
  }catch(e){gridErr(e.message);}
}
function renderSidebar(stats,total){
  const c=document.getElementById('cat-list');
  document.getElementById('cnt-all').textContent=total;
  c.innerHTML=`<div class="cat-item ${S.cat===''?'active':''}" onclick="setCat('')" data-cat=""><span class="cat-item-name">Tous les documents</span><span class="cat-item-count">${total}</span></div>`
    +stats.map(s=>`<div class="cat-item ${S.cat===s.category?'active':''}" onclick="setCat('${esc(s.category)}')" data-cat="${esc(s.category)}"><span class="cat-item-name">${esc(TYPE_LABELS[s.category]||s.category)}</span><span class="cat-item-count">${s.count}</span></div>`).join('');
}
function renderStatsMini(stats){
  document.getElementById('stats-mini').innerHTML=stats.map(s=>`<div class="stat-mini-row" onclick="setCat('${esc(s.category)}')"><span class="smr-name">${esc(TYPE_LABELS[s.category]||s.category)}</span><span class="smr-conf ${confCls(s.avg_confidence)}">${s.avg_confidence.toFixed(0)}%</span></div>`).join('');
}
function renderGrid(){
  const g=document.getElementById('doc-grid');
  g.className=`doc-grid ${S.view==='list'?'list-mode':''}`;
  if(!S.docs.length){g.innerHTML=`<div class="grid-empty"><div class="grid-empty-icon"><svg viewBox="0 0 24 24"><path d="M10 10.07H9a4 4 0 00-4 4v.93"/></svg></div><div style="font-size:12px">${S.q?`Aucun résultat pour «${esc(S.q)}»`:'Aucun document'}</div></div>`;return;}
  g.innerHTML=S.docs.map(doc=>{
    const cc=confCls(doc.confidence);const sel=S.sel.has(doc._id);const act=S.activeId===doc._id;
    return`<div class="doc-card ${sel?'selected':''} ${act?'active':''}" id="c-${doc._id}" onclick="openDetail('${doc._id}')">
      <div class="doc-thumb">
        <div class="doc-thumb-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="doc-type-tag">${esc(TYPE_LABELS[doc.prediction]||doc.prediction)}</div>
        <div class="doc-sel-cb ${sel?'checked':''}" onclick="event.stopPropagation();toggleSel('${doc._id}')"></div>
      </div>
      <div class="doc-info">
        <div class="doc-name" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div>
        <div class="doc-meta"><span class="conf-tag ${cc}">${(doc.confidence||0).toFixed(0)}%</span><span class="doc-date">${fmtDate(doc.uploaded_at)}</span></div>
      </div>
    </div>`;
  }).join('');
}
function renderPager(){
  const bar=document.getElementById('pager');if(S.pages<=1){bar.innerHTML='';return;}
  const p=S.page,t=S.pages,range=[];
  for(let i=1;i<=t;i++){if(i===1||i===t||Math.abs(i-p)<=1)range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  bar.innerHTML=`<button class="pg-btn" onclick="loadDocs(${p-1})" ${p<=1?'disabled':''}>←</button>${range.map(r=>r==='…'?`<span class="pg-ellipsis">…</span>`:`<button class="pg-btn ${r===p?'active':''}" onclick="loadDocs(${r})">${r}</button>`).join('')}<button class="pg-btn" onclick="loadDocs(${p+1})" ${p>=t?'disabled':''}>→</button>`;
}
function gridErr(msg){document.getElementById('doc-grid').innerHTML=`<div class="grid-empty"><div style="font-size:12px;color:var(--danger)">${esc(msg)}</div></div>`;}

async function openDetail(id){
  S.activeId=id;
  document.querySelectorAll('.doc-card').forEach(c=>{c.classList.remove('active');});
  document.getElementById(`c-${id}`)?.classList.add('active');
  document.getElementById('d-empty').style.display='none';
  const dc=document.getElementById('d-content');dc.style.display='flex';
  document.getElementById('d-body').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px"><div class="spin"></div></div>`;
  document.getElementById('detail').classList.add('show');
  try{const r=await fetch(`${API}/documents/${id}`);const doc=await r.json();renderDetail(doc);}
  catch(e){document.getElementById('d-body').innerHTML=`<div style="padding:16px;font-size:12px;color:var(--danger)">Erreur : ${esc(e.message)}</div>`;}
}

function renderDetail(doc){
  const cc=confCls(doc.confidence);const ocr=doc.ocr_text||'';
  document.getElementById('d-header').innerHTML=`<div style="width:20px;height:20px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div><div class="detail-title">${esc(doc.original_filename)}</div><button class="detail-close" onclick="closeDetail()">×</button>`;
  document.getElementById('d-actions').innerHTML=`<button class="act-btn primary" onclick="dlDoc('${doc._id}','${esc(doc.original_filename)}')">Télécharger</button><button class="act-btn danger" onclick="delDoc('${doc._id}')">Supprimer</button>`;

  /* ── Résultats des LLM stockés dans le document ── */
  const qwen=doc.qwen||{};
  const llamaResult=doc.llama_result||{};  // Stocké par le pipeline depuis la v2
  const votes=doc.votes||{};

  // Affichage des verdicts LLM (depuis les données MongoDB)
  // On détermine les verdicts à partir des votes stockés
  const llamaPred=votes.llm||llamaResult.class||null;
  const qwenPred=votes.qwen||qwen.class||null;
  const modelPred=doc.prediction;
  const llamaAgrees=llamaPred&&llamaPred.toLowerCase()===modelPred.toLowerCase();
  const qwenAgrees=qwenPred&&qwenPred.toLowerCase()===modelPred.toLowerCase();
  const llamaAvail=!!(llamaPred);
  const qwenAvail=!!(qwenPred||qwen.available);

  const llmVerdictsHTML=`<div class="llm-verdicts">
    <div class="llm-verdict-row">
      <div class="llm-verdict-name">llama3.2<span style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:4px">texte OCR</span></div>
      <div class="llm-verdict-pred">${llamaAvail?esc(TYPE_LABELS[llamaPred]||llamaPred):'—'}</div>
      <div class="llm-v-badge ${!llamaAvail?'unavail':llamaAgrees?'agree':'disagree'}">${!llamaAvail?'Non dispo':llamaAgrees?'✓ Confirme':'✗ Désaccorde'}</div>
    </div>
    <div class="llm-verdict-row">
      <div class="llm-verdict-name" style="color:var(--purple)">Qwen2.5-VL<span style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:4px">vision</span></div>
      <div class="llm-verdict-pred">${qwenAvail?esc(TYPE_LABELS[qwenPred]||qwenPred||'—'):'—'}</div>
      <div class="llm-v-badge ${!qwenAvail?'unavail':qwenAgrees?'agree':'disagree'}">${!qwenAvail?'Non dispo':qwenAgrees?'✓ Confirme':'✗ Désaccorde'}</div>
    </div>
  </div>
  ${qwen.reasoning?`<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border-subtle);line-height:1.5">${esc(qwen.reasoning.substring(0,200))}</div>`:''}`;

  const SUPPORTED=['carte_identite','rib','cheque','tableau_amortissement','acte_naissance','acte_heredite','assurance','attestation_solde'];
  const supE=SUPPORTED.includes(doc.prediction);
  const cached=doc.extracted_fields;
  const hasCache=cached&&Object.values(cached).some(v=>v);

  const correctionHTML=`<div class="d-section">
    <div class="d-sec-label">Correction de classification</div>
    <div class="correction-form" id="corr-form-${doc._id}">
      <div class="correction-tabs">
        <button class="ct-btn active" id="ct-exist-${doc._id}" onclick="setCorrTab('${doc._id}','existing')">Type existant</button>
        <button class="ct-btn" id="ct-new-${doc._id}" onclick="setCorrTab('${doc._id}','new')">Nouveau type</button>
      </div>
      <div id="ct-existing-panel-${doc._id}">
        <select class="corr-select" id="cs-${doc._id}">${renderTypeOptions(doc.prediction)}</select>
      </div>
      <div id="ct-new-panel-${doc._id}" style="display:none">
        <div class="new-type-fields">
          <div>
            <input class="field-input" type="text" id="nt-name-${doc._id}" placeholder="Identifiant (ex: certificat_vie)" oninput="onNtName('${doc._id}',this.value)" maxlength="50"/>
            <div class="slug-prev" id="nt-slug-${doc._id}"></div>
            <div class="field-hint">Minuscules, chiffres, underscores uniquement</div>
          </div>
          <input class="field-input" type="text" id="nt-label-${doc._id}" placeholder="Libellé affiché (ex: Certificat de vie)"/>
          <div class="info-box">Le type sera disponible au ré-entraînement à partir de <strong>50 documents</strong> classifiés.</div>
        </div>
      </div>
      <button class="corr-btn" id="corr-btn-${doc._id}" onclick="correctCat('${doc._id}')">Confirmer la correction</button>
    </div>
  </div>`;

  const scHTML=doc.all_scores?.length?`<div class="d-section">
    <div class="d-sec-label">Scores EfficientNet+mBERT</div>
    <div class="scores-mini">${doc.all_scores.map((s,i)=>`<div class="sc-row"><div class="sc-name">${esc(TYPE_LABELS[s.class]||s.class)}</div><div class="sc-bg"><div class="sc-fill ${i===0?'top':''}" style="width:${(s.score*100).toFixed(0)}%"></div></div><div class="sc-pct">${(s.score*100).toFixed(1)}%</div></div>`).join('')}</div>
  </div>`:'';

  document.getElementById('d-body').innerHTML=`
    <div class="d-section">
      <div class="d-sec-label">Classification</div>
      <div class="pred-row">
        <div class="pred-class">${esc(TYPE_LABELS[doc.prediction]||doc.prediction)}</div>
        <div class="pred-path">${esc(doc.path||'—')}</div>
      </div>
      <div class="conf-row">
        <div class="conf-labels"><span class="conf-label">Confiance</span><span class="conf-val ${cc}">${(doc.confidence||0).toFixed(1)}%</span></div>
        <div class="cbar"><div class="cbar-fill ${cc}" style="width:${Math.min(doc.confidence||0,100)}%"></div></div>
      </div>
      ${doc.agreement!==undefined?`<div style="font-family:var(--mono);font-size:10px;margin-top:8px;padding:4px 8px;border:1px solid;display:inline-block;${doc.agreement?'background:var(--success-bg);color:var(--success);border-color:var(--success-border)':'background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border)'}">${doc.agreement?'✅ Validé par double confirmation LLM':'⚠️ Révision humaine requise'}</div>`:''}
    </div>
    <div class="d-section">
      <div class="d-sec-label">Verdicts des LLM confirmateurs</div>
      ${llmVerdictsHTML}
    </div>
    <div class="d-section">
      <div class="d-sec-label">Métadonnées</div>
      <div class="meta-grid">
        <div class="meta-cell"><div class="meta-key">Fichier</div><div class="meta-val">${esc(doc.original_filename)}</div></div>
        <div class="meta-cell"><div class="meta-key">Taille</div><div class="meta-val">${fmtSz(doc.file_size_bytes)}</div></div>
        <div class="meta-cell"><div class="meta-key">Soumis le</div><div class="meta-val">${fmtFull(doc.uploaded_at)}</div></div>
        <div class="meta-cell"><div class="meta-key">Traitement</div><div class="meta-val">${doc.time_ms?doc.time_ms+' ms':'—'}</div></div>
        <div class="meta-cell full"><div class="meta-key">ID</div><div class="meta-val" style="font-size:9px;color:var(--text3)">${esc(doc._id)}</div></div>
      </div>
    </div>
    ${correctionHTML}
    ${supE?`<div class="d-section" id="extract-sec-${doc._id}">
      <div class="d-sec-label">${esc(TYPE_LABELS[doc.prediction]||doc.prediction)} — Champs extraits par IA</div>
      <div id="extract-body-${doc._id}">${hasCache?renderFields(cached,doc.extraction_source||'',doc.prediction,doc._id):`<button class="extract-btn" onclick="runExtract('${doc._id}','${doc.prediction}')">⚙ Extraire les informations via IA</button>`}</div>
    </div>`:''}
    ${scHTML}
    ${ocr?`<div class="d-section"><div class="d-sec-label">Texte OCR</div><div class="ocr-text">${esc(ocr)}</div></div>`:''}
  `;
}

function renderTypeOptions(current){
  const baseTypes=Object.keys(TYPE_LABELS);
  const customTypes=(S.allTypes||[]).filter(t=>t.is_custom);
  let opts=baseTypes.map(k=>`<option value="${k}" ${k===current?'selected':''}>${esc(TYPE_LABELS[k])}</option>`).join('');
  if(customTypes.length){opts+=customTypes.map(t=>`<option value="${t.name}" ${t.name===current?'selected':''}>${esc(t.label||t.name)} (personnalisé)</option>`).join('');}
  opts+=`<option value="inconnu" ${current==='inconnu'?'selected':''}>Inconnu</option>`;
  return opts;
}
function setCorrTab(docId,mode){
  const ep=document.getElementById(`ct-existing-panel-${docId}`);
  const np=document.getElementById(`ct-new-panel-${docId}`);
  const eb=document.getElementById(`ct-exist-${docId}`);
  const nb=document.getElementById(`ct-new-${docId}`);
  if(mode==='existing'){ep.style.display='';np.style.display='none';eb.classList.add('active');nb.classList.remove('active');}
  else{ep.style.display='none';np.style.display='';nb.classList.add('active');eb.classList.remove('active');}
}
function onNtName(docId,val){
  const slug=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  const sp=document.getElementById(`nt-slug-${docId}`);
  if(slug){sp.style.display='block';sp.textContent=`→ ${slug}`;}else{sp.style.display='none';}
  const li=document.getElementById(`nt-label-${docId}`);
  if(li&&!li.value)li.placeholder=val.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
}
async function correctCat(id){
  const existing=document.getElementById(`ct-existing-panel-${id}`);
  const isNew=existing?.style.display==='none';
  try{
    let body={};
    if(!isNew){const sel=document.getElementById(`cs-${id}`);if(!sel)return;body={type_name:sel.value,create_new:false};}
    else{
      const raw=document.getElementById(`nt-name-${id}`)?.value.trim()||'';
      const slug=raw.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      const label=document.getElementById(`nt-label-${id}`)?.value.trim()||slug.replace(/_/g,' ');
      if(!slug||slug.length<2){toast('Identifiant invalide (min 2 caractères)','err');return;}
      body={type_name:slug,label,create_new:true};
    }
    const r=await fetch(`${API}/documents/${id}/classify_manual`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.success){toast(isNew?`Type "${body.label||body.type_name}" créé et document classifié`:`Catégorie corrigée → ${body.type_name}`,'ok');await loadAllTypes();await loadStats();await loadDocs(S.page);setTimeout(()=>openDetail(id),400);}
    else toast('Erreur : '+(d.error||'?'),'err');
  }catch{toast('Erreur réseau','err');}
}

/* ── renderFields : affichage des champs extraits ─────
   FIX: passage de docId pour le bouton "Ré-extraire"  */
function renderFields(fields, source, docType, docId){
  const labels=FIELD_LABELS[docType]||{};
  const entries=Object.entries(fields).filter(([,v])=>v!==undefined);// Inclure les null pour voir les champs vides
  if(!entries.length)return`<div style="font-size:12px;color:var(--text3);padding:8px 0">Aucun champ extrait</div>`;

  const filledCount=entries.filter(([,v])=>v).length;
  const srcMap={'llama3.2':'llama','qwen':'qwen','cache':'cache'};
  const sCls=srcMap[source]||'cache';
  const srcLabel={'llama3.2':'llama3.2','qwen':'Qwen2.5-VL','cache':'cache'}[source]||source||'—';
  const targetId=docId||S.activeId;

  return`<table class="fields-table">
    ${entries.map(([k,v])=>`<tr>
      <td class="ft-key">${esc(labels[k]||k)}</td>
      <td class="ft-val ${v?'':'empty'}">${v?esc(String(v)):'—'}</td>
    </tr>`).join('')}
  </table>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px">
    <span class="source-badge ${sCls}">Via ${esc(srcLabel)} · ${filledCount}/${entries.length} champs</span>
    <button class="extract-btn" style="width:auto;padding:4px 12px;font-size:11px" onclick="runExtract('${targetId}','${docType}',true)">Ré-extraire</button>
  </div>`;
}

/* ── runExtract : extraction ou ré-extraction via LLM ─
   FIX: gestion d'erreur complète + timeout visible      */
async function runExtract(docId, docType, force=false){
  const body=document.getElementById(`extract-body-${docId}`);
  if(!body)return;
  body.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:10px;font-size:12px;color:var(--text3)"><div class="spin" style="width:14px;height:14px;border-width:2px"></div>Extraction en cours (llama3.2 → Qwen si besoin)…</div>`;
  try{
    const r=await fetch(`${API}/documents/${docId}/extract`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({force})
    });
    const d=await r.json();
    if(d.error){
      body.innerHTML=`<div class="extract-error">${esc(d.error)}</div><button class="extract-btn" onclick="runExtract('${docId}','${docType}')">Réessayer</button>`;
      return;
    }
    const filledCount=Object.values(d.fields||{}).filter(v=>v).length;
    const totalFields=Object.keys(d.fields||{}).length;
    if(filledCount===0){
      body.innerHTML=`<div class="extract-error">Aucun champ extrait — texte OCR peut-être insuffisant (${d.source||'?'})</div>
        <button class="extract-btn" onclick="runExtract('${docId}','${docType}',true)">Réessayer</button>`;
      return;
    }
    toast(`${filledCount}/${totalFields} champs extraits via ${d.source||'LLM'}`,'ok');
    body.innerHTML=renderFields(d.fields||{},d.source,docType,docId);
  }catch(e){
    body.innerHTML=`<div class="extract-error">Erreur réseau : ${esc(e.message)}</div><button class="extract-btn" onclick="runExtract('${docId}','${docType}')">Réessayer</button>`;
  }
}

function closeDetail(){S.activeId=null;document.getElementById('d-empty').style.display='flex';document.getElementById('d-content').style.display='none';document.querySelectorAll('.doc-card').forEach(c=>c.classList.remove('active'));document.getElementById('detail').classList.remove('show');}
function setCat(cat){S.cat=cat;S.page=1;document.querySelectorAll('.cat-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));loadDocs(1);}
function setSort(v){S.sort=v;loadDocs(1);}
function setConf(v){S.confMin=parseInt(v);document.getElementById('conf-val').textContent=v+'%';clearTimeout(searchT);searchT=setTimeout(()=>loadDocs(1),400);}
function onSearch(v){document.getElementById('s-clear').style.display=v?'block':'none';clearTimeout(searchT);searchT=setTimeout(()=>{S.q=v;loadDocs(1);},350);}
function clearSearch(){document.getElementById('search').value='';document.getElementById('s-clear').style.display='none';S.q='';loadDocs(1);}
function setView(v){S.view=v;document.getElementById('vg').classList.toggle('active',v==='grid');document.getElementById('vl').classList.toggle('active',v==='list');renderGrid();}
function toggleSel(id){S.sel.has(id)?S.sel.delete(id):S.sel.add(id);const c=document.getElementById(`c-${id}`);c?.classList.toggle('selected',S.sel.has(id));c?.querySelector('.doc-sel-cb')?.classList.toggle('checked',S.sel.has(id));updateBatch();}
function toggleSelAll(){S.sel.size===S.docs.length?S.sel.clear():S.docs.forEach(d=>S.sel.add(d._id));renderGrid();updateBatch();}
function clearSel(){S.sel.clear();renderGrid();updateBatch();}
function updateBatch(){const n=S.sel.size;document.getElementById('batch-bar').classList.toggle('show',n>0);document.getElementById('batch-cnt').textContent=`${n} sélectionné${n>1?'s':''}`;}
async function batchDel(){if(!S.sel.size)return;if(!confirm(`Supprimer ${S.sel.size} document(s) ?`))return;let ok=0;for(const id of[...S.sel]){try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();if(d.success)ok++;}catch{}}S.sel.clear();updateBatch();toast(`${ok} document(s) supprimé(s)`,'ok');closeDetail();await loadStats();await loadDocs(1);}
async function batchDL(){for(const id of[...S.sel]){const doc=S.docs.find(d=>d._id===id);if(doc){const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=doc.original_filename;a.click();await new Promise(r=>setTimeout(r,200));}}toast('Téléchargements démarrés','ok');}
async function dlDoc(id,fn){const a=document.createElement('a');a.href=`${API}/documents/${id}/download`;a.download=fn;a.click();toast('Téléchargement démarré','ok');}
async function delDoc(id){if(!confirm('Supprimer ce document ?'))return;try{const r=await fetch(`${API}/documents/${id}`,{method:'DELETE'});const d=await r.json();if(d.success){toast('Document supprimé','ok');closeDetail();await loadStats();await loadDocs(S.page);}else toast('Erreur : '+(d.error||'?'),'err');}catch{toast('Erreur réseau','err');}}
function toast(msg,type='ok'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);}
</script>
