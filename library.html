<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BankDoc — Bibliothèque</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080c14;--bg2:#0e1420;--bg3:#141c2e;--bg4:#1a2238;
  --border:#1e2d4a;--border2:#253556;
  --accent:#3b82f6;--accent2:#6366f1;
  --cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --text:#e2e8f0;--text2:#64748b;--text3:#94a3b8;
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--display);display:flex;flex-direction:column}
.topbar{height:52px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;background:var(--bg)}
.back-btn{display:flex;align-items:center;gap:7px;color:var(--text2);font-size:11px;font-family:var(--mono);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:all .15s}
.back-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.back-btn.cyan{color:var(--cyan);border-color:rgba(6,182,212,.3)}
.back-btn.cyan:hover{background:rgba(6,182,212,.06)}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:-.02em}
.topbar-count{font-family:var(--mono);font-size:10px;color:var(--text2);padding:3px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.mongo-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:20px}
.mongo-status.ok{background:rgba(16,185,129,.08);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.mongo-status.err{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.mongo-status.loading{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot.err{background:var(--red)}
.dot.loading{background:var(--text2)}

/* Layout */
.layout{display:grid;grid-template-columns:272px 1fr 400px;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.sb-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.sb-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--text2);text-transform:uppercase;margin-bottom:9px;display:block}

.search-box{position:relative}
.search-box input{width:100%;padding:8px 30px 8px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.search-box input::placeholder{color:var(--text2)}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none}
.s-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;display:none;padding:0}

.filter-group{display:flex;flex-direction:column;gap:3px}
.fi{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;font-size:12px}
.fi:hover{background:var(--bg3);border-color:var(--border)}
.fi.active{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.2);color:var(--accent)}
.fi-left{display:flex;align-items:center;gap:8px}
.fi-emoji{font-size:13px;width:18px;text-align:center}
.fi-name{font-size:11px}
.fi-badge{font-family:var(--mono);font-size:9px;color:var(--text2);background:var(--bg4);padding:2px 7px;border-radius:10px}
.fi.active .fi-badge{background:rgba(59,130,246,.12);color:var(--accent)}

.sort-sel{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;cursor:pointer}

.range-wrap{display:flex;flex-direction:column;gap:5px}
.range-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text2)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bg4);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(59,130,246,.4)}

.sb-scroll{flex:1;overflow-y:auto}
.stats-mini{display:flex;flex-direction:column;gap:5px;padding:12px 16px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s}
.stat-row:hover{border-color:var(--border2)}
.stat-cat{font-family:var(--mono);font-size:9px;color:var(--text2)}
.stat-val{font-family:var(--mono);font-size:12px;font-weight:500}

/* Center */
.grid-area{display:flex;flex-direction:column;overflow:hidden}
.batch-bar{display:none;align-items:center;gap:10px;padding:9px 18px;background:rgba(59,130,246,.06);border-bottom:1px solid rgba(59,130,246,.2);font-size:11px;font-family:var(--mono)}
.batch-bar.show{display:flex}
.batch-count{color:var(--accent);font-weight:500}
.batch-btn{padding:5px 11px;border-radius:7px;cursor:pointer;font-family:var(--mono);font-size:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .12s}
.batch-btn:hover{border-color:var(--border2);color:var(--text)}
.batch-btn.danger:hover{border-color:rgba(239,68,68,.4);color:var(--red);background:rgba(239,68,68,.06)}
.batch-desel{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;margin-left:auto}

.grid-toolbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg)}
.view-btns{display:flex;gap:3px}
.view-btn{padding:5px 10px;border-radius:7px;cursor:pointer;background:none;border:1px solid var(--border);color:var(--text2);font-size:12px;transition:all .12s}
.view-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.grid-info{font-family:var(--mono);font-size:10px;color:var(--text2);margin-left:auto}
.sel-all-btn{padding:5px 11px;border-radius:7px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:10px;transition:all .12s}
.sel-all-btn:hover{border-color:var(--border2);color:var(--text)}

.doc-grid{flex:1;overflow-y:auto;padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;align-content:start}
.doc-grid.list{grid-template-columns:1fr;gap:5px}

.doc-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative}
.doc-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.doc-card.selected{border-color:var(--accent);background:rgba(59,130,246,.04)}
.doc-card.active{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(6,182,212,.12)}

.doc-thumb{height:95px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;border-bottom:1px solid var(--border)}
.cat-tag{position:absolute;bottom:5px;left:6px;font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px;background:rgba(8,12,20,.85);border:1px solid var(--border);color:var(--text3)}
.sel-cb{position:absolute;top:6px;right:6px;width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);background:rgba(8,12,20,.6);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);transition:all .12s}
.sel-cb.checked{background:var(--accent);border-color:var(--accent)}
.sel-cb.checked::after{content:"✓";color:#fff;font-size:8px;font-weight:700}

.doc-info{padding:9px}
.doc-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.doc-meta-row{display:flex;gap:6px;align-items:center}
.conf-badge{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px}
.conf-badge.hi{background:rgba(16,185,129,.1);color:var(--green)}
.conf-badge.mid{background:rgba(245,158,11,.1);color:var(--amber)}
.conf-badge.lo{background:rgba(239,68,68,.1);color:var(--red)}
.doc-date{font-family:var(--mono);font-size:8px;color:var(--text2)}

/* List mode */
.doc-grid.list .doc-card{display:flex;align-items:center}
.doc-grid.list .doc-thumb{width:56px;height:48px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--border);font-size:18px}
.doc-grid.list .doc-info{display:flex;align-items:center;gap:14px;flex:1;padding:0 12px}
.doc-grid.list .doc-name{flex:1;margin:0}
.doc-grid.list .cat-tag{display:none}

.pager{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;justify-content:center;background:var(--bg)}
.pg-btn{padding:5px 10px;border-radius:6px;font-family:var(--mono);font-size:10px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .12s}
.pg-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-btn.active{background:rgba(59,130,246,.1);border-color:var(--accent);color:var(--accent)}
.pg-dots{font-family:var(--mono);font-size:10px;color:var(--text2)}

/* Empty / loading */
.empty-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;grid-column:1/-1;color:var(--text2)}
.empty-icon{font-size:40px;opacity:.2}
.empty-msg{font-family:var(--mono);font-size:11px}
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px;grid-column:1/-1}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Detail Panel */
.detail{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2)}
.d-empty-icon{font-size:36px;opacity:.2}
.d-empty p{font-family:var(--mono);font-size:11px}

.d-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg)}
.d-cat-em{font-size:20px}
.d-title{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:4px;transition:color .12s}
.d-close:hover{color:var(--text)}

.d-body{flex:1;overflow-y:auto}
.d-sec{padding:14px 18px;border-bottom:1px solid var(--border)}
.d-sec-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.d-sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

.pred-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pred-class{font-size:17px;font-weight:700;letter-spacing:-.03em}
.pred-path{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}

.cbar-wrap{margin-bottom:8px}
.cbar-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text2);margin-bottom:4px}
.cbar-bg{height:3px;background:var(--bg4);border-radius:2px}
.cbar-fill{height:3px;border-radius:2px;transition:width .6s}
.cbar-fill.hi{background:linear-gradient(90deg,var(--green),var(--cyan))}
.cbar-fill.mid{background:linear-gradient(90deg,var(--amber),#fb923c)}
.cbar-fill.lo{background:linear-gradient(90deg,var(--red),#f97316)}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.meta-f{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.meta-f.full{grid-column:span 2}
.meta-lbl{font-family:var(--mono);font-size:8px;color:var(--text2);margin-bottom:2px;letter-spacing:.08em;text-transform:uppercase}
.meta-v{font-family:var(--mono);font-size:10px;word-break:break-word;line-height:1.4}

.doc-info-card{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:10px}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text2);font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;min-width:80px}
.info-v{font-family:var(--mono);font-size:10px;font-weight:500;text-align:right;flex:1;word-break:break-word;color:var(--cyan)}
.info-v.empty{color:var(--text2);font-style:italic;font-weight:400}

/* LLM Extract button & states */
.extract-btn{
  width:100%;padding:9px;border-radius:8px;
  background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.25);
  color:var(--cyan);font-family:var(--mono);font-size:10px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.extract-btn:hover{background:rgba(6,182,212,.16);border-color:rgba(6,182,212,.45)}
.extract-btn:disabled{opacity:.4;cursor:not-allowed}
.extract-source{
  font-family:var(--mono);font-size:8px;
  padding:2px 7px;border-radius:10px;margin-top:7px;
  display:inline-flex;align-items:center;gap:4px;
}
.extract-source.llama{background:rgba(16,185,129,.08);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.extract-source.qwen{background:rgba(139,92,246,.08);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.extract-source.cache{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.extract-source.none{background:rgba(239,68,68,.06);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.extract-loading{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text2);padding:12px 0}
.extracted-count{font-family:var(--mono);font-size:9px;color:var(--text2);margin-left:auto}

.ocr-area{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:var(--mono);font-size:8px;color:var(--text3);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}

.qwen-block{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:10px}
.qw-head{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.qw-tag{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:3px;background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.qw-cls{font-size:12px;font-weight:600;color:var(--purple)}
.qw-conf{font-family:var(--mono);font-size:9px;color:var(--text2);margin-left:auto}
.qw-reason{font-family:var(--mono);font-size:8px;color:var(--text2);line-height:1.5;margin-top:5px}
.agree-chip{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:8px}
.agree-chip.yes{background:rgba(16,185,129,.08);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.agree-chip.no{background:rgba(245,158,11,.08);color:var(--amber);border:1px solid rgba(245,158,11,.2)}

.scores-mini{display:flex;flex-direction:column;gap:4px}
.sc-row{display:grid;grid-template-columns:110px 1fr 36px;gap:6px;align-items:center}
.sc-name{font-family:var(--mono);font-size:8px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-bg{height:2px;background:var(--bg4);border-radius:1px}
.sc-fill{height:2px;border-radius:1px;background:var(--border2)}
.sc-fill.top{background:var(--accent)}
.sc-pct{font-family:var(--mono);font-size:8px;color:var(--text2);text-align:right}

.correct-form{display:flex;gap:7px;margin-top:7px}
.correct-sel{flex:1;padding:7px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:10px;outline:none}
.correct-sel:focus{border-color:var(--accent)}
.correct-btn{padding:7px 12px;border-radius:7px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--accent);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap}
.correct-btn:hover{background:rgba(59,130,246,.2)}

.d-actions{padding:14px 18px;display:flex;gap:7px;border-top:1px solid var(--border)}
.act-btn{flex:1;padding:9px;border-radius:9px;font-family:var(--display);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.act-btn:hover{border-color:var(--border2)}
.act-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
.act-btn.primary:hover{opacity:.9}
.act-btn.danger{color:var(--red);border-color:rgba(239,68,68,.2)}
.act-btn.danger:hover{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.4)}

/* Toasts */
.toasts{position:fixed;bottom:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:7px}
.toast{padding:9px 15px;border-radius:9px;font-family:var(--mono);font-size:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);animation:fadeup .25s ease;max-width:280px}
.toast.ok{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06)}
.toast.err{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)}
@keyframes fadeup{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:1100px){
  .layout{grid-template-columns:240px 1fr}
  .detail{display:none}
  .detail.mob{display:flex;position:fixed;inset:52px 0 0 0;z-index:500}
}
@media(max-width:680px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← Classifier</a>
  <div class="topbar-title">📚 Bibliothèque</div>
  <div class="topbar-count" id="total-cnt">—</div>
  <div class="topbar-right">
    <a class="back-btn cyan" href="batch.html">⚡ Upload batch</a>
    <div class="mongo-status loading" id="mongo-st">
      <span class="dot loading"></span>
      <span>MongoDB…</span>
    </div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <span class="sb-label">Recherche</span>
      <div class="search-box">
        <span class="s-icon">⌕</span>
        <input type="text" id="search" placeholder="Nom, texte OCR, catégorie…" oninput="onSearch(this.value)"/>
        <button class="s-clear" id="s-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="sb-section">
      <span class="sb-label">Catégorie</span>
      <div class="filter-group" id="cat-list">
        <div class="fi active" onclick="setCat('')" data-cat="">
          <div class="fi-left"><span class="fi-emoji">📁</span><span class="fi-name">Tous</span></div>
          <span class="fi-badge" id="cnt-all">—</span>
        </div>
      </div>
    </div>
    <div class="sb-section">
      <span class="sb-label">Trier par</span>
      <select class="sort-sel" id="sort" onchange="setSort(this.value)">
        <option value="date_desc">Date ↓ (récents)</option>
        <option value="date_asc">Date ↑ (anciens)</option>
        <option value="conf_desc">Confiance ↓</option>
        <option value="conf_asc">Confiance ↑</option>
        <option value="name_asc">Nom A → Z</option>
      </select>
    </div>
    <div class="sb-section">
      <span class="sb-label">Confiance min. <span id="conf-lbl" style="color:var(--accent)">0%</span></span>
      <div class="range-wrap">
        <input type="range" min="0" max="100" value="0" id="conf-range" oninput="setConf(this.value)"/>
        <div class="range-row"><span>0%</span><span>50%</span><span>100%</span></div>
      </div>
    </div>
    <div class="sb-scroll">
      <div class="stats-mini" id="stats-mini"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="grid-area">
    <div class="batch-bar" id="batch-bar">
      <span class="batch-count" id="batch-cnt">0 sélectionné(s)</span>
      <button class="batch-btn" onclick="batchDL()">⬇ Télécharger</button>
      <button class="batch-btn danger" onclick="batchDel()">🗑 Supprimer</button>
      <button class="batch-desel" onclick="clearSel()">✕</button>
    </div>
    <div class="grid-toolbar">
      <div class="view-btns">
        <button class="view-btn active" id="vg" onclick="setView('grid')" title="Grille">⊞</button>
        <button class="view-btn" id="vl" onclick="setView('list')" title="Liste">☰</button>
      </div>
      <div class="grid-info" id="grid-info">—</div>
      <button class="sel-all-btn" onclick="toggleSelAll()">☐ Tout sélectionner</button>
    </div>
    <div class="doc-grid" id="doc-grid">
      <div class="spin-wrap"><div class="spin"></div><span style="font-family:var(--mono);font-size:10px;color:var(--text2)">Chargement…</span></div>
    </div>
    <div class="pager" id="pager"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div class="d-empty" id="d-empty">
      <div class="d-empty-icon">👆</div>
      <p>Cliquez sur un document</p>
    </div>
    <div id="d-content" style="display:none;flex-direction:column;height:100%">
      <div class="d-header" id="d-hdr"></div>
      <div class="d-body" id="d-body"></div>
      <div class="d-actions" id="d-acts"></div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API = "http://localhost:5000";

/* ── Document type definitions (emoji + label only — extraction done server-side via LLM) ── */
const DT = {
  carte_identite:         {emoji:"🪪", label:"Carte d'Identité"},
  rib:                    {emoji:"🏦", label:"RIB"},
  cheque:                 {emoji:"💳", label:"Chèque"},
  tableau_amortissement:  {emoji:"📊", label:"Tableau d'amortissement"},
  acte_naissance:         {emoji:"📜", label:"Acte de naissance"},
  acte_heredite:          {emoji:"⚖️", label:"Acte d'hérédité"},
  assurance:              {emoji:"🛡️", label:"Assurance"},
  attestation_solde:      {emoji:"📋", label:"Attestation de solde"},
};

/* ── State ── */
let S={docs:[],total:0,page:1,perPage:24,pages:1,cat:"",q:"",sort:"date_desc",confMin:0,sel:new Set(),view:"grid",activeId:null};
let searchT=null;

/* ── Boot ── */
(async()=>{checkMongo();await loadStats();await loadDocs();})();

async function checkMongo(){
  try{
    const r=await fetch(`${API}/status`,{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    const el=document.getElementById("mongo-st");
    el.className=`mongo-status ${d.mongodb?"ok":"err"}`;
    el.innerHTML=`<span class="dot ${d.mongodb?"ok":"err"}"></span><span>MongoDB ${d.mongodb?"connecté":"hors ligne"}</span>`;
  }catch(e){
    const el=document.getElementById("mongo-st");
    el.className="mongo-status err";
    el.innerHTML=`<span class="dot err"></span><span>Serveur hors ligne</span>`;
  }
}

async function loadStats(){
  try{
    const r=await fetch(`${API}/documents/stats`);
    const d=await r.json();
    S.allStats=d.stats||[];
    renderSidebar(d.stats||[],d.total||0);
    renderStatsMini(d.stats||[]);
    document.getElementById("total-cnt").textContent=`${d.total||0} doc${(d.total||0)!==1?"s":""}`;
  }catch(e){}
}

async function loadDocs(page=1){
  S.page=page;
  const g=document.getElementById("doc-grid");
  g.innerHTML=`<div class="spin-wrap"><div class="spin"></div><span style="font-family:var(--mono);font-size:10px;color:var(--text2)">Chargement…</span></div>`;
  try{
    const p=new URLSearchParams({category:S.cat,q:S.q,page,per_page:S.perPage,sort:S.sort,conf_min:S.confMin});
    const r=await fetch(`${API}/documents?${p}`);
    const d=await r.json();
    if(d.error){gridErr(d.error);return;}
    S.docs=d.documents||[];S.total=d.total;S.pages=d.pages;
    renderGrid();renderPager();gridInfo();
  }catch(e){gridErr(e.message);}
}

/* ── Sidebar ── */
function renderSidebar(stats,total){
  const c=document.getElementById("cat-list");
  document.getElementById("cnt-all").textContent=total;
  c.innerHTML=`
    <div class="fi ${S.cat===""?"active":""}" onclick="setCat('')" data-cat="">
      <div class="fi-left"><span class="fi-emoji">📁</span><span class="fi-name">Tous</span></div>
      <span class="fi-badge">${total}</span>
    </div>
    ${stats.map(s=>{const dt=DT[s.category];return`
      <div class="fi ${S.cat===s.category?"active":""}" onclick="setCat('${esc(s.category)}')" data-cat="${esc(s.category)}">
        <div class="fi-left"><span class="fi-emoji">${dt?.emoji||"📄"}</span><span class="fi-name">${esc(s.category)}</span></div>
        <span class="fi-badge">${s.count}</span>
      </div>`;}).join("")}`;
}

function renderStatsMini(stats){
  const c=document.getElementById("stats-mini");
  if(!stats.length){c.innerHTML="";return;}
  c.innerHTML=`<span class="sb-label" style="padding-top:10px">Statistiques</span>`+stats.map(s=>`
    <div class="stat-row" onclick="setCat('${esc(s.category)}')">
      <span class="stat-cat">${esc(s.category)}</span>
      <span class="stat-val" style="color:${s.avg_confidence>=80?"var(--green)":s.avg_confidence>=60?"var(--amber)":"var(--red)"}">Ø ${s.avg_confidence.toFixed(0)}%</span>
    </div>`).join("");
}

/* ── Grid ── */
function renderGrid(){
  const g=document.getElementById("doc-grid");
  g.className=`doc-grid ${S.view==="list"?"list":""}`;
  if(!S.docs.length){
    g.innerHTML=`<div class="empty-center"><div class="empty-icon">🔍</div><p class="empty-msg">${S.q?`Aucun résultat pour « ${esc(S.q)} »`:"Aucun document ici"}</p></div>`;
    return;
  }
  g.innerHTML=S.docs.map(d=>card(d)).join("");
}

function card(doc){
  const dt=DT[doc.prediction];
  const cc=cconf(doc.confidence);
  const sel=S.sel.has(doc._id);
  const act=S.activeId===doc._id;
  return`<div class="doc-card ${sel?"selected":""} ${act?"active":""}" id="c-${doc._id}" onclick="openDetail('${doc._id}')">
    <div class="doc-thumb">
      <span>${dt?.emoji||"📄"}</span>
      <div class="cat-tag">${esc(doc.prediction)}</div>
      <div class="sel-cb ${sel?"checked":""}" onclick="event.stopPropagation();toggleSel('${doc._id}')"></div>
    </div>
    <div class="doc-info">
      <div class="doc-name" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div>
      <div class="doc-meta-row">
        <span class="conf-badge ${cc}">${(doc.confidence||0).toFixed(0)}%</span>
        <span class="doc-date">${fmtS(doc.uploaded_at)}</span>
      </div>
    </div>
  </div>`;
}

function renderPager(){
  const bar=document.getElementById("pager");
  if(S.pages<=1){bar.innerHTML="";return;}
  const p=S.page,t=S.pages;
  const range=[];
  for(let i=1;i<=t;i++){
    if(i===1||i===t||Math.abs(i-p)<=1)range.push(i);
    else if(range[range.length-1]!=="…")range.push("…");
  }
  bar.innerHTML=`
    <button class="pg-btn" onclick="loadDocs(${p-1})" ${p<=1?"disabled":""}>←</button>
    ${range.map(r=>r==="…"?`<span class="pg-dots">…</span>`:`<button class="pg-btn ${r===p?"active":""}" onclick="loadDocs(${r})">${r}</button>`).join("")}
    <button class="pg-btn" onclick="loadDocs(${p+1})" ${p>=t?"disabled":""}>→</button>`;
}

function gridInfo(){
  const s=(S.page-1)*S.perPage+1,e=Math.min(S.page*S.perPage,S.total);
  document.getElementById("grid-info").textContent=`${s}–${e} sur ${S.total}`;
}
function gridErr(msg){document.getElementById("doc-grid").innerHTML=`<div class="empty-center"><div class="empty-icon">⚠️</div><p class="empty-msg">${esc(msg)}</p></div>`;}

/* ── Detail ── */
async function openDetail(id){
  S.activeId=id;
  document.querySelectorAll(".doc-card").forEach(c=>{c.classList.remove("active");});
  document.getElementById(`c-${id}`)?.classList.add("active");
  document.getElementById("d-empty").style.display="none";
  const dc=document.getElementById("d-content");
  dc.style.display="flex";
  document.getElementById("d-body").innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px"><div class="spin"></div></div>`;
  document.getElementById("detail").classList.add("mob");
  try{
    const r=await fetch(`${API}/documents/${id}`);
    const doc=await r.json();
    renderDetail(doc);
  }catch(e){
    document.getElementById("d-body").innerHTML=`<div style="padding:16px;font-family:var(--mono);font-size:10px;color:var(--red)">Erreur: ${esc(e.message)}</div>`;
  }
}

function renderDetail(doc){
  const dt=DT[doc.prediction];
  const cc=cconf(doc.confidence);
  const ocr=doc.ocr_text||"";

  document.getElementById("d-hdr").innerHTML=`
    <span class="d-cat-em">${dt?.emoji||"📄"}</span>
    <div class="d-title" title="${esc(doc.original_filename)}">${esc(doc.original_filename)}</div>
    <button class="d-close" onclick="closeDetail()">✕</button>`;

  document.getElementById("d-acts").innerHTML=`
    <button class="act-btn primary" onclick="dlDoc('${doc._id}','${esc(doc.original_filename)}')">⬇ Télécharger</button>
    <button class="act-btn danger" onclick="delDoc('${doc._id}')">🗑</button>`;

  const qwenH=doc.qwen?.class?`
    <div class="d-sec">
      <div class="d-sec-title">Analyse Qwen2.5-VL</div>
      <div class="qwen-block">
        <div class="qw-head">
          <span class="qw-tag">🔮 qwen2.5vl</span>
          <span class="qw-cls">${esc(doc.qwen.class)}</span>
          <span class="qw-conf">${((doc.qwen.confidence||0)*100).toFixed(0)}%</span>
        </div>
        ${doc.qwen.reasoning?`<div class="qw-reason">${esc(doc.qwen.reasoning.substring(0,180))}</div>`:""}
        <div class="agree-chip ${doc.qwen.class===doc.prediction?"yes":"no"}">${doc.qwen.class===doc.prediction?"✓ Accord":"⚠ Désaccord"}</div>
      </div>
    </div>`:""

  const scH=doc.all_scores?.length?`
    <div class="d-sec">
      <div class="d-sec-title">Scores modèle</div>
      <div class="scores-mini">
        ${doc.all_scores.map((s,i)=>`<div class="sc-row">
          <div class="sc-name">${esc(s.class)}</div>
          <div class="sc-bg"><div class="sc-fill ${i===0?"top":""}" style="width:${(s.score*100).toFixed(0)}%"></div></div>
          <div class="sc-pct">${(s.score*100).toFixed(1)}%</div>
        </div>`).join("")}
      </div>
    </div>`:"";

  // Determine if doc type is supported for extraction
  const SUPPORTED_TYPES=["carte_identite","rib","cheque","tableau_amortissement","acte_naissance","acte_heredite","assurance","attestation_solde"];
  const supportsExtract=SUPPORTED_TYPES.includes(doc.prediction);

  // Check if already extracted and cached in MongoDB doc
  const cachedFields=doc.extracted_fields;
  const extractionSource=doc.extraction_source||"";
  const hasCache=cachedFields&&Object.values(cachedFields).some(v=>v);

  document.getElementById("d-body").innerHTML=`
    <div class="d-sec">
      <div class="d-sec-title">Classification</div>
      <div class="pred-row">
        <div class="pred-class">${dt?.emoji||"📄"} ${esc(doc.prediction)}</div>
        <div class="pred-path">${esc(doc.path||"direct")}</div>
      </div>
      <div class="cbar-wrap">
        <div class="cbar-lbl"><span>Confiance</span><span style="color:${cc==="hi"?"var(--green)":cc==="mid"?"var(--amber)":"var(--red)"}">${(doc.confidence||0).toFixed(1)}%</span></div>
        <div class="cbar-bg"><div class="cbar-fill ${cc}" style="width:${Math.min(doc.confidence||0,100)}%"></div></div>
      </div>
      <div style="margin-top:10px">
        <div class="meta-lbl">Corriger la catégorie</div>
        <div class="correct-form">
          <select class="correct-sel" id="cs-${doc._id}">
            ${Object.keys(DT).map(k=>`<option value="${k}" ${k===doc.prediction?"selected":""}>${DT[k].emoji} ${k}</option>`).join("")}
            <option value="inconnu" ${doc.prediction==="inconnu"?"selected":""}>❓ inconnu</option>
          </select>
          <button class="correct-btn" onclick="correctCat('${doc._id}')">✓</button>
        </div>
      </div>
    </div>

    <div class="d-sec">
      <div class="d-sec-title">Métadonnées</div>
      <div class="meta-grid">
        <div class="meta-f"><div class="meta-lbl">Fichier</div><div class="meta-v">${esc(doc.original_filename)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Taille</div><div class="meta-v">${fmtSz(doc.file_size_bytes)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Déposé le</div><div class="meta-v">${fmtF(doc.uploaded_at)}</div></div>
        <div class="meta-f"><div class="meta-lbl">Traitement</div><div class="meta-v">${doc.time_ms?doc.time_ms+" ms":"—"}</div></div>
        <div class="meta-f full"><div class="meta-lbl">📁 Chemin</div><div class="meta-v" style="font-size:9px;color:var(--text2)">${esc(doc.stored_path||"—")}</div></div>
        <div class="meta-f full"><div class="meta-lbl">ID MongoDB</div><div class="meta-v" style="font-size:9px;color:var(--text2)">${esc(doc._id)}</div></div>
      </div>
    </div>

    ${supportsExtract?`
    <div class="d-sec" id="extract-sec">
      <div class="d-sec-title">
        ${dt?.emoji||"📄"} Informations ${esc(dt?.label||doc.prediction)}
        <span class="extracted-count" id="extract-count"></span>
      </div>
      <div id="extract-body">
        ${hasCache
          ? renderExtractedFields(cachedFields,extractionSource,doc.prediction)
          : `<button class="extract-btn" id="extract-btn" onclick="runExtract('${doc._id}','${doc.prediction}')">
              🤖 Extraire les informations via IA (llama3.2)
            </button>`
        }
      </div>
    </div>`:""}

    ${qwenH}
    ${scH}

    ${ocr?`
    <div class="d-sec">
      <div class="d-sec-title">Texte OCR complet</div>
      <div class="ocr-area">${esc(ocr)}</div>
    </div>`:""}
  `;
}

/* ── LLM Extraction ── */
// Field labels by doc type (for display only — actual extraction done server-side)
const FIELD_LABELS = {
  carte_identite:{nom:"Nom",prenom:"Prénom",cin_number:"N° CIN",date_naissance:"Date naissance",lieu_naissance:"Lieu naissance",date_delivrance:"Date délivrance",date_expiration:"Date expiration",adresse:"Adresse",sexe:"Sexe"},
  rib:{titulaire:"Titulaire",iban:"IBAN",bic:"BIC / SWIFT",code_banque:"Code banque",code_guichet:"Code guichet",num_compte:"N° compte",cle_rib:"Clé RIB",domiciliation:"Domiciliation",banque:"Banque"},
  cheque:{beneficiaire:"Bénéficiaire",montant_chiffres:"Montant (chiffres)",montant_lettres:"Montant (lettres)",date_emission:"Date d'émission",num_cheque:"N° chèque",tire_sur:"Tiré sur",emetteur:"Émetteur",endossable:"Endossable"},
  tableau_amortissement:{montant_pret:"Montant prêt",taux_interet:"Taux d'intérêt",duree:"Durée",mensualite:"Mensualité",capital_initial:"Capital initial",date_debut:"Date de début",nombre_echeances:"Nb échéances",banque:"Banque"},
  acte_naissance:{nom:"Nom",prenom:"Prénom",date_naissance:"Date naissance",heure_naissance:"Heure",lieu_naissance:"Lieu",sexe:"Sexe",pere:"Père",mere:"Mère",num_acte:"N° acte",date_acte:"Date acte"},
  acte_heredite:{defunt:"Défunt(e)",date_deces:"Date décès",lieu_deces:"Lieu décès",heritiers:"Héritiers",notaire:"Notaire",date_acte:"Date acte",lieu_acte:"Lieu acte"},
  assurance:{assure:"Assuré(e)",num_contrat:"N° contrat",type_garantie:"Type garantie",date_effet:"Date d'effet",date_echeance:"Date échéance",prime:"Prime",assureur:"Assureur",agence:"Agence"},
  attestation_solde:{titulaire:"Titulaire",num_compte:"N° compte",solde:"Solde",arrete_au:"Arrêté au",banque:"Banque",agence:"Agence",type_compte:"Type compte"},
};

function renderExtractedFields(fields, source, docType){
  const labels=FIELD_LABELS[docType]||{};
  const entries=Object.entries(fields);
  if(!entries.length) return `<div style="font-family:var(--mono);font-size:10px;color:var(--text2);padding:8px 0">Aucun champ disponible pour ce type.</div>`;

  const filled=entries.filter(([,v])=>v).length;
  const total=entries.length;

  // Update count badge
  setTimeout(()=>{
    const el=document.getElementById("extract-count");
    if(el) el.textContent=`${filled}/${total} champs`;
  },0);

  const sourceLabel={llama3:"🦙 llama3.2","llama3.2":"🦙 llama3.2",qwen:"🔮 Qwen2.5-VL",cache:"💾 cache",none:"— aucune IA"}[source]||source;
  const sourceCls={llama3:"llama","llama3.2":"llama",qwen:"qwen",cache:"cache",none:"none"}[source]||"cache";

  return `
    <div class="doc-info-card">
      ${entries.map(([k,v])=>`
        <div class="info-row">
          <span class="info-key">${esc(labels[k]||k)}</span>
          <span class="info-v ${v?"":"empty"}">${v?esc(String(v)):"—"}</span>
        </div>`).join("")}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <span class="extract-source ${sourceCls}">Source : ${sourceLabel}</span>
      <button class="extract-btn" style="width:auto;padding:4px 10px;font-size:9px" onclick="runExtract('${S.activeId}','${docType}',true)">↺ Ré-extraire</button>
    </div>`;
}

async function runExtract(docId, docType, force=false){
  const btn=document.getElementById("extract-btn");
  const body=document.getElementById("extract-body");
  if(!body)return;

  body.innerHTML=`<div class="extract-loading"><div class="spin" style="width:16px;height:16px;border-width:1.5px"></div>Extraction en cours via llama3.2… (peut prendre 10-30s)</div>`;
  if(btn)btn.disabled=true;

  try{
    const r=await fetch(`${API}/documents/${docId}/extract`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({force}),
    });
    const d=await r.json();
    if(d.error){
      body.innerHTML=`<div style="font-family:var(--mono);font-size:10px;color:var(--red);padding:8px 0">⚠ ${esc(d.error)}</div>
        <button class="extract-btn" onclick="runExtract('${docId}','${docType}')">↺ Réessayer</button>`;
      return;
    }
    const filled=Object.values(d.fields||{}).filter(v=>v).length;
    toast(`✅ ${filled} champs extraits via ${d.source}`, "ok");
    body.innerHTML=renderExtractedFields(d.fields||{}, d.source, docType);
  }catch(e){
    body.innerHTML=`<div style="font-family:var(--mono);font-size:10px;color:var(--red);padding:8px 0">⚠ Erreur réseau : ${esc(e.message)}</div>
      <button class="extract-btn" onclick="runExtract('${docId}','${docType}')">↺ Réessayer</button>`;
  }
}

function closeDetail(){
  S.activeId=null;
  document.getElementById("d-empty").style.display="flex";
  document.getElementById("d-content").style.display="none";
  document.querySelectorAll(".doc-card").forEach(c=>c.classList.remove("active"));
  document.getElementById("detail").classList.remove("mob");
}

/* ── Correct category ── */
async function correctCat(id){
  const sel=document.getElementById(`cs-${id}`);
  if(!sel)return;
  const newCat=sel.value;
  try{
    const r=await fetch(`${API}/documents/${id}/correct`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prediction:newCat})
    });
    const d=await r.json();
    if(d.success){
      toast("✅ Catégorie corrigée","ok");
      await loadStats();await loadDocs(S.page);
    }else toast("Erreur: "+(d.error||"?"),"err");
  }catch(e){toast("Erreur réseau","err");}
}

/* ── Filters ── */
function setCat(cat){
  S.cat=cat;S.page=1;
  document.querySelectorAll(".fi").forEach(el=>el.classList.toggle("active",el.dataset.cat===cat));
  loadDocs(1);
}
function setSort(v){S.sort=v;loadDocs(1);}
function setConf(v){
  S.confMin=parseInt(v);
  document.getElementById("conf-lbl").textContent=v+"%";
  clearTimeout(searchT);searchT=setTimeout(()=>loadDocs(1),400);
}
function onSearch(v){
  document.getElementById("s-clear").style.display=v?"block":"none";
  clearTimeout(searchT);searchT=setTimeout(()=>{S.q=v;loadDocs(1);},350);
}
function clearSearch(){
  document.getElementById("search").value="";
  document.getElementById("s-clear").style.display="none";
  S.q="";loadDocs(1);
}
function setView(v){
  S.view=v;
  document.getElementById("vg").classList.toggle("active",v==="grid");
  document.getElementById("vl").classList.toggle("active",v==="list");
  renderGrid();
}

/* ── Selection ── */
function toggleSel(id){
  S.sel.has(id)?S.sel.delete(id):S.sel.add(id);
  const card=document.getElementById(`c-${id}`);
  card?.classList.toggle("selected",S.sel.has(id));
  card?.querySelector(".sel-cb")?.classList.toggle("checked",S.sel.has(id));
  updateBatch();
}
function toggleSelAll(){
  S.sel.size===S.docs.length?S.sel.clear():S.docs.forEach(d=>S.sel.add(d._id));
  renderGrid();updateBatch();
}
function clearSel(){S.sel.clear();renderGrid();updateBatch();}
function updateBatch(){
  const n=S.sel.size;
  document.getElementById("batch-bar").classList.toggle("show",n>0);
  document.getElementById("batch-cnt").textContent=`${n} sélectionné${n>1?"s":""}`;
}

/* ── Batch actions ── */
async function batchDel(){
  if(!S.sel.size)return;
  if(!confirm(`Supprimer ${S.sel.size} document(s) ?`))return;
  let ok=0,fail=0;
  for(const id of[...S.sel]){
    try{const r=await fetch(`${API}/documents/${id}`,{method:"DELETE"});const d=await r.json();d.success?ok++:fail++;}catch{fail++;}
  }
  S.sel.clear();updateBatch();
  toast(`🗑 ${ok} supprimé(s)${fail?", "+fail+" erreur(s)":""}`,ok>0?"ok":"err");
  closeDetail();await loadStats();await loadDocs(1);
}
async function batchDL(){
  for(const id of[...S.sel]){
    const doc=S.docs.find(d=>d._id===id);
    if(doc){await new Promise(r=>setTimeout(r,200));const a=document.createElement("a");a.href=`${API}/documents/${id}/download`;a.download=doc.original_filename;a.click();}
  }
  toast("⬇ Téléchargements démarrés","ok");
}

/* ── Doc actions ── */
async function dlDoc(id,fn){
  const a=document.createElement("a");a.href=`${API}/documents/${id}/download`;a.download=fn;a.click();
  toast("⬇ Téléchargement démarré","ok");
}
async function delDoc(id){
  if(!confirm("Supprimer ce document définitivement ?"))return;
  try{
    const r=await fetch(`${API}/documents/${id}`,{method:"DELETE"});
    const d=await r.json();
    if(d.success){toast("🗑 Supprimé","ok");closeDetail();await loadStats();await loadDocs(S.page);}
    else toast("Erreur: "+(d.error||"?"),"err");
  }catch(e){toast("Erreur réseau","err");}
}

/* ── Utils ── */
function cconf(c){return c>=80?"hi":c>=60?"mid":"lo";}
function fmtS(iso){if(!iso)return"—";return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"});}
function fmtF(iso){if(!iso)return"—";return new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtSz(b){if(!b)return"—";if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(1)+" KB";return(b/1048576).toFixed(1)+" MB";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg,type="ok"){
  const c=document.getElementById("toasts");
  const t=document.createElement("div");t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300);},3000);
}
</script>
